<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c0392b" />
  <title>Alunos – Riva BJJ</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .aluno-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .aluno-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .aluno-nome {
      font-size: 17px;
      font-weight: 900;
      color: #fff;
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }
    .aluno-email {
      font-size: 13px;
      color: #aaa;
      margin-top: 2px;
      word-break: break-all;
    }
    .aluno-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .aluno-faixa {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      background: #2a2a2a;
      border-radius: 8px;
      padding: 3px 10px;
    }
    .badge-ativo {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
    }
    .badge-inativo {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 999px;
      background: var(--red);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
    }
    .btn-toggle {
      background: #222;
      border: 1px solid #333;
      color: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-toggle:active { opacity: .75; }
    .btn-faixa {
      background: #1a1a2e;
      border: 1px solid #444;
      color: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-faixa:active { opacity: .75; }
    .trocar-faixa-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .trocar-faixa-inline select {
      background: #222;
      border: 1px solid #555;
      color: #fff;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      flex: 1;
      min-width: 100px;
    }
    .btn-confirmar-faixa {
      background: var(--red);
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-confirmar-faixa:active { opacity: .75; }
    .btn-cancelar-faixa {
      background: #333;
      border: 1px solid #555;
      color: #aaa;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-cancelar-faixa:active { opacity: .75; }
    .aluno-detalhes {
      margin-top: 10px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .detalhe-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .detalhe-label {
      font-size: 12px;
      color: #aaa;
      white-space: nowrap;
    }
    .detalhe-valor {
      font-size: 12px;
      color: #fff;
      font-weight: 600;
      text-align: right;
      word-break: break-word;
    }
    #searchBox {
      margin-bottom: 14px;
    }
    .lista-vazia {
      color: #aaa;
      text-align: center;
      padding: 24px 0;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <header class="hdr">
    <div class="hdr-inner">
      <img class="logo" src="./logo.png" alt="Riva BJJ" />
    </div>
  </header>

  <main class="page">

    <!-- ── LISTA ──────────────────────────────────────────────── -->
    <section class="hidden" id="sectionAlunos">
      <div class="card">
        <h1 class="title">Alunos</h1>
        <input id="searchBox" class="input" type="search" placeholder="Buscar por nome…" />
        <p class="msg info" id="listInfo"></p>
      </div>

      <div id="listaAlunos"></div>

      <div class="card">
        <button class="btn secondary" onclick="location.href='./cadastroaluno.html'">+ Cadastrar Aluno</button>
        <button class="btn secondary" onclick="location.href='./professor.html'">← Voltar ao Portal</button>
      </div>
    </section>

  </main>

  <script>
    const API_BASE       = 'https://script.google.com/macros/s/AKfycbyBLlVjEvO35RufIh6pH9XOOTDXuj_BMrNHAJfdw9I-reScWX31dsVdOFJna1ZbJVqX/exec';
    const API_TIMEOUT_MS = 25000;
    const TOKEN_KEY      = 'rv_prof_token';

    let todosAlunos = [];

    function apiCall(params) {
      return new Promise((resolve, reject) => {
        const cb = '_rv' + Date.now() + Math.floor(Math.random() * 9999);
        const s  = document.createElement('script');
        const t  = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, API_TIMEOUT_MS);
        function cleanup() { clearTimeout(t); delete window[cb]; s.remove(); }
        window[cb] = (d) => { cleanup(); resolve(d); };
        s.onerror  = () => { cleanup(); reject(new Error('net')); };
        const qs = Object.entries(params).map(([k, v]) => `${k}=${encodeURIComponent(v)}`).join('&');
        s.src = `${API_BASE}?${qs}&callback=${cb}`;
        document.head.appendChild(s);
      });
    }

    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
    function setErr(id, msg)  { document.getElementById(id).textContent = msg; }
    function setInfo(id, msg) { document.getElementById(id).textContent = msg; }

    // ── Init ───────────────────────────────────────────────────
    function init() {
      const token = sessionStorage.getItem(TOKEN_KEY);
      if (token === 'rv_prof_ok') {
        show('sectionAlunos');
        carregarAlunos();
      } else {
        location.href = './professor.html';
      }
    }

    // ── Carregar alunos ────────────────────────────────────────
    async function carregarAlunos() {
      setInfo('listInfo', 'Carregando alunos…');
      document.getElementById('listaAlunos').innerHTML = '';
      try {
        const r = await apiCall({
          action: 'listarAlunos',
          token:  sessionStorage.getItem(TOKEN_KEY) || '',
        });
        if (r && r.ok && Array.isArray(r.alunos)) {
          todosAlunos = r.alunos;
          setInfo('listInfo', '');
          renderLista(todosAlunos);
        } else {
          setInfo('listInfo', r && r.erro ? r.erro : 'Erro ao carregar alunos.');
        }
      } catch (e) {
        setInfo('listInfo', 'Erro de conexão. Tente novamente.');
      }
    }

    // ── Renderizar lista ───────────────────────────────────────
    function renderLista(alunos) {
      const container = document.getElementById('listaAlunos');
      if (!alunos.length) {
        container.innerHTML = '<p class="lista-vazia">Nenhum aluno encontrado.</p>';
        return;
      }
      container.innerHTML = alunos.map(a => `
        <div class="aluno-card" id="card-${esc(String(a.id))}">
          <div class="aluno-header">
            <div>
              <div class="aluno-nome">${esc(a.nome_aluno)}</div>
              <div class="aluno-email">${esc(a.email || '—')}</div>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0;">
              <button class="btn-faixa"
                data-id="${esc(String(a.id))}"
                id="btnFaixa-${esc(String(a.id))}">
                Trocar Faixa
              </button>
              <button class="btn-toggle"
                data-id="${esc(String(a.id))}"
                data-status="${esc(a.status)}"
                id="btn-${esc(String(a.id))}">
                ${a.status === 'ATIVO' ? 'Desativar' : 'Ativar'}
              </button>
            </div>
          </div>
          <div class="aluno-meta">
            <span class="aluno-faixa" id="faixaLabel-${esc(String(a.id))}">${esc(a.faixa || '—')} G${esc(String(a.grau_atual ?? '—'))}</span>
            <span class="${a.status === 'ATIVO' ? 'badge-ativo' : 'badge-inativo'}" id="badge-${esc(String(a.id))}">
              ${esc(a.status || '—')}
            </span>
          </div>
          <div class="aluno-detalhes" id="detalhes-${esc(String(a.id))}">
            <div class="detalhe-row"><span class="detalhe-label">Categoria</span><span class="detalhe-valor">${esc(a.categoria || '—')}</span></div>
            <div class="detalhe-row"><span class="detalhe-label">Aulas no Grau</span><span class="detalhe-valor">${esc(String(a.aulas_no_grau ?? '—'))}</span></div>
            <div class="detalhe-row"><span class="detalhe-label">Aulas Restantes</span><span class="detalhe-valor">${esc(String(a.aulas_restantes ?? '—'))}</span></div>
            <div class="detalhe-row"><span class="detalhe-label">Último Grau</span><span class="detalhe-valor">${esc(formatarData(a.data_ultimo_grau))}</span></div>
            <div class="detalhe-row"><span class="detalhe-label">Telefone</span><span class="detalhe-valor">${esc(a.telefone || '—')}</span></div>
            <div class="detalhe-row"><span class="detalhe-label">CPF</span><span class="detalhe-valor">${esc(a.cpf || '—')}</span></div>
            <div class="detalhe-row"><span class="detalhe-label">Nascimento</span><span class="detalhe-valor">${esc(formatarData(a.data_nasc))}</span></div>
          </div>
          <div class="trocar-faixa-inline" id="trocaFaixaArea-${esc(String(a.id))}" style="display:none;">
            <select id="selectFaixa-${esc(String(a.id))}">
              <optgroup label="── Adulto ──">
                <option value="Branca">Branca</option>
                <option value="Azul">Azul</option>
                <option value="Roxa">Roxa</option>
                <option value="Marrom">Marrom</option>
                <option value="Preta">Preta</option>
              </optgroup>
              <optgroup label="── Kids / Infantil / Juvenil ──">
                <option value="Cinza e Branca">Cinza e Branca</option>
                <option value="Cinza">Cinza</option>
                <option value="Cinza e Preta">Cinza e Preta</option>
                <option value="Amarela e Branca">Amarela e Branca</option>
                <option value="Amarela">Amarela</option>
                <option value="Amarela e Preta">Amarela e Preta</option>
                <option value="Laranja e Branca">Laranja e Branca</option>
                <option value="Laranja">Laranja</option>
                <option value="Laranja e Preta">Laranja e Preta</option>
                <option value="Verde e Branca">Verde e Branca</option>
                <option value="Verde">Verde</option>
                <option value="Verde e Preta">Verde e Preta</option>
              </optgroup>
            </select>
            <button class="btn-confirmar-faixa" data-id="${esc(String(a.id))}">Confirmar</button>
            <button class="btn-cancelar-faixa" data-id="${esc(String(a.id))}">Cancelar</button>
          </div>
        </div>
      `).join('');
    }

    // ── Filtro de busca ────────────────────────────────────────
    document.getElementById('searchBox').addEventListener('input', (e) => {
      const q = e.target.value.trim().toLowerCase();
      if (!q) { renderLista(todosAlunos); return; }
      renderLista(todosAlunos.filter(a =>
        (a.nome_aluno || '').toLowerCase().includes(q)
      ));
    });

    // ── Event delegation para botões de toggle ─────────────────
    document.getElementById('listaAlunos').addEventListener('click', (e) => {
      const btnToggle = e.target.closest('.btn-toggle');
      if (btnToggle) {
        const id     = btnToggle.dataset.id;
        const status = btnToggle.dataset.status;
        if (id && status) toggleStatus(id, status);
        return;
      }

      const btnFaixa = e.target.closest('.btn-faixa');
      if (btnFaixa) {
        const id   = btnFaixa.dataset.id;
        const area = document.getElementById('trocaFaixaArea-' + id);
        if (area) area.style.display = area.style.display === 'none' ? 'flex' : 'none';
        return;
      }

      const btnConfirmar = e.target.closest('.btn-confirmar-faixa');
      if (btnConfirmar) {
        const id        = btnConfirmar.dataset.id;
        const novaFaixa = document.getElementById('selectFaixa-' + id).value;
        trocarFaixa(id, novaFaixa);
        return;
      }

      const btnCancelar = e.target.closest('.btn-cancelar-faixa');
      if (btnCancelar) {
        const id   = btnCancelar.dataset.id;
        const area = document.getElementById('trocaFaixaArea-' + id);
        if (area) area.style.display = 'none';
        return;
      }
    });

    // ── Toggle status (otimista) ────────────────────────────────
    async function toggleStatus(id, statusAtual) {
      const novoStatus = statusAtual === 'ATIVO' ? 'INATIVO' : 'ATIVO';
      const btn   = document.getElementById('btn-' + id);
      const badge = document.getElementById('badge-' + id);

      // Optimistic UI update
      const aluno = todosAlunos.find(a => String(a.id) === String(id));
      if (aluno) aluno.status = novoStatus;
      if (btn) {
        btn.textContent    = novoStatus === 'ATIVO' ? 'Desativar' : 'Ativar';
        btn.dataset.status = novoStatus;
        btn.disabled       = true;
      }
      if (badge) {
        badge.textContent = novoStatus;
        badge.className   = novoStatus === 'ATIVO' ? 'badge-ativo' : 'badge-inativo';
      }

      try {
        const r = await apiCall({
          action: 'alterarStatusAluno',
          token:  sessionStorage.getItem(TOKEN_KEY) || '',
          id,
          status: novoStatus,
        });
        if (!r || !r.ok) {
          // Revert on failure
          if (aluno) aluno.status = statusAtual;
          if (btn) {
            btn.textContent    = statusAtual === 'ATIVO' ? 'Desativar' : 'Ativar';
            btn.dataset.status = statusAtual;
          }
          if (badge) {
            badge.textContent = statusAtual;
            badge.className   = statusAtual === 'ATIVO' ? 'badge-ativo' : 'badge-inativo';
          }
          alert(r && r.erro ? r.erro : 'Erro ao alterar status.');
        }
      } catch (e) {
        // Revert on error
        if (aluno) aluno.status = statusAtual;
        if (btn) {
          btn.textContent    = statusAtual === 'ATIVO' ? 'Desativar' : 'Ativar';
          btn.dataset.status = statusAtual;
        }
        if (badge) {
          badge.textContent = statusAtual;
          badge.className   = statusAtual === 'ATIVO' ? 'badge-ativo' : 'badge-inativo';
        }
        alert('Erro de conexão.');
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    // ── Trocar faixa ────────────────────────────────────────────
    async function trocarFaixa(id, novaFaixa) {
      const btnF  = document.getElementById('btnFaixa-' + id);
      const area  = document.getElementById('trocaFaixaArea-' + id);
      const label = document.getElementById('faixaLabel-' + id);
      if (btnF) btnF.disabled = true;

      try {
        const r = await apiCall({
          action:    'trocarFaixa',
          token:     sessionStorage.getItem(TOKEN_KEY) || '',
          id,
          novaFaixa,
        });
        if (r && r.ok) {
          const aluno = todosAlunos.find(a => String(a.id) === String(id));
          if (aluno) {
            aluno.faixa      = novaFaixa;
            aluno.grau_atual = 0;
          }
          if (label) label.textContent = novaFaixa + ' G0';
          if (area) area.style.display = 'none';
        } else {
          alert(r && r.erro ? r.erro : 'Erro ao trocar faixa.');
        }
      } catch (e) {
        alert('Erro de conexão.');
      } finally {
        if (btnF) btnF.disabled = false;
      }
    }

    // ── Escape HTML ────────────────────────────────────────────
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ── Formatar data YYYY-MM-DD → DD/MM/YYYY ─────────────────
    function formatarData(val) {
      if (!val || String(val).trim() === '' || String(val).trim() === 'undefined') return '—';
      var s = String(val).trim();
      if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
        var parts = s.substring(0, 10).split('-');
        return parts[2] + '/' + parts[1] + '/' + parts[0];
      }
      return s;
    }

    init();
  </script>
</body>
</html>
