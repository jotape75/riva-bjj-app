<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c0392b" />
  <title>Alunos – Riva BJJ</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    /* ── Header desktop compacto ── */
    .admin-hdr-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .admin-hdr-titulo { display: none; }
    .admin-hdr-sair { display: none; }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-logout:active { opacity: .75; }
    /* ── Logo maior ── */
    .admin-logo {
      width: 56px !important;
      height: 56px !important;
      margin-top: 0 !important;
    }
    @media (min-width: 769px) {
      .admin-hdr-inner {
        max-width: 1100px;
        justify-content: space-between;
        padding: 0 24px;
      }
      .admin-logo {
        width: 64px !important;
        height: 64px !important;
        margin-top: 0 !important;
      }
      .admin-hdr-titulo {
        display: inline;
        font-size: 20px;
        font-weight: 900;
        color: #fff;
        letter-spacing: 0.5px;
      }
      .admin-hdr-sair { display: inline-block; }
      .admin-page { max-width: 1100px; padding: 32px 32px 64px; }
    }
    @media (max-width: 768px) {
      .admin-hdr-inner { justify-content: center; }
    }

    .aluno-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .aluno-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .aluno-nome {
      font-size: 17px;
      font-weight: 900;
      color: #fff;
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }
    .aluno-email {
      font-size: 13px;
      color: #aaa;
      margin-top: 2px;
      word-break: break-all;
    }
    .aluno-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .aluno-faixa {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      background: #2a2a2a;
      border-radius: 8px;
      padding: 3px 10px;
    }
    .badge-ativo {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
    }
    .badge-inativo {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 999px;
      background: var(--red);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
    }
    .btn-toggle {
      background: #222;
      border: 1px solid #333;
      color: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-toggle:active { opacity: .75; }
    .btn-faixa {
      background: #1a1a2e;
      border: 1px solid #444;
      color: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-faixa:active { opacity: .75; }
    .trocar-faixa-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .trocar-faixa-inline select {
      background: #222;
      border: 1px solid #555;
      color: #fff;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      flex: 1;
      min-width: 100px;
    }
    .btn-confirmar-faixa {
      background: var(--red);
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-confirmar-faixa:active { opacity: .75; }
    .btn-cancelar-faixa {
      background: #333;
      border: 1px solid #555;
      color: #aaa;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-cancelar-faixa:active { opacity: .75; }
    .aluno-detalhes {
      margin-top: 10px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 16px;
    }
    .detalhe-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .detalhe-row.full-width {
      grid-column: 1 / -1;
    }
    .detalhe-label {
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .detalhe-valor {
      font-size: 15px;
      color: #fff;
      font-weight: 700;
      word-break: break-word;
    }
    #searchBox {
      margin-bottom: 8px;
    }
    .lista-vazia {
      color: #aaa;
      text-align: center;
      padding: 24px 0;
      font-size: 15px;
    }
    .aluno-financeiro {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .fin-header {
      font-size: 15px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 10px;
    }
    .fin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 16px;
      margin-bottom: 12px;
    }
    .fin-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .fin-label {
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .fin-valor {
      font-size: 15px;
      color: #fff;
      font-weight: 700;
    }
    .fin-status-pago   { color: #2ecc71; }
    .fin-status-aberto { color: #f39c12; }
    .fin-status-vencido { color: #e74c3c; }
    .fin-acoes {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-fin {
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      border: none;
    }
    .btn-fin.primary {
      background: var(--red);
      color: #fff;
    }
    .btn-fin.secondary {
      background: #2a2a2a;
      border: 1px solid #444;
      color: #fff;
    }
    .btn-fin:active { opacity: .75; }
    .fin-msg {
      font-size: 13px;
      margin-top: 8px;
      min-height: 18px;
    }

    /* ── Barra de busca sticky ── */
    .busca-fixa {
      position: sticky;
      top: 72px;
      z-index: 9;
      background: var(--bg);
      padding: 12px 0 4px;
      margin-bottom: 8px;
    }
    @media (max-width: 768px) {
      .busca-fixa { top: 68px; }
    }
    .busca-fixa .input { margin-bottom: 8px; }
    .busca-btns {
      display: flex;
      gap: 8px;
    }
    .busca-btns .btn {
      margin-top: 0;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 800;
    }
    .busca-btns .btn:first-child { flex: 1; }
    .busca-btns .btn-atualizar {
      flex-shrink: 0;
      width: auto;
      padding: 12px 18px;
    }

    /* ── Rodapé fixo ── */
    .rodape-fixo {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
    }
    .rodape-fixo .btn {
      margin-top: 0;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
      display: block;
    }
    @media (min-width: 769px) {
      .rodape-fixo .btn { max-width: 1100px; }
    }

    /* ── Lista com padding-bottom para não ficar atrás do rodapé ── */
    .lista-scroll { padding-bottom: 90px; }
  </style>
</head>
<body>
  <header class="hdr admin-hdr">
    <div class="hdr-inner admin-hdr-inner">
      <div class="admin-hdr-left">
        <img class="logo admin-logo" src="./logo.png" alt="Riva BJJ" />
        <span class="admin-hdr-titulo">Portal Administrativo</span>
      </div>
      <button class="btn-logout admin-hdr-sair" id="btnHdrSair">Sair</button>
    </div>
  </header>

  <main class="page admin-page">

    <!-- ── LISTA ──────────────────────────────────────────────── -->
    <section class="hidden" id="sectionAlunos">
      <div class="busca-fixa">
        <h1 class="title" style="margin-bottom:10px;">Alunos</h1>
        <input id="searchBox" class="input" type="search" placeholder="Buscar por nome ou CPF…" />
        <div class="busca-btns">
          <button class="btn secondary" id="btnVerTodos">Ver todos</button>
          <button class="btn secondary btn-atualizar" id="btnAtualizar">🔄 Atualizar</button>
        </div>
        <p class="msg info" id="listInfo"></p>
      </div>

      <div id="listaAlunos" class="lista-scroll"></div>

      <div class="rodape-fixo">
        <button class="btn secondary" onclick="location.href='./administrativo.html'">← Voltar ao Portal</button>
      </div>
    </section>

  </main>

  <script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, doc, query, orderBy, getDocs, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const TOKEN_KEY = 'rv_prof_token';
    const CACHE_KEY_ALUNOS = 'rv_alunos_cache';
    const CACHE_TTL_ALUNOS = 60 * 60 * 1000; // 1 hora

    function salvarCacheAlunos(alunos) {
      try {
        localStorage.setItem(CACHE_KEY_ALUNOS, JSON.stringify({ ts: Date.now(), alunos }));
      } catch(e) {}
    }

    function lerCacheAlunos() {
      try {
        const c = JSON.parse(localStorage.getItem(CACHE_KEY_ALUNOS) || 'null');
        if (c && Date.now() - c.ts < CACHE_TTL_ALUNOS) return c.alunos;
      } catch(e) {}
      return null;
    }

    function invalidarCacheAlunos() {
      localStorage.removeItem(CACHE_KEY_ALUNOS);
    }

    let todosAlunos = [];
    let listaCarregada = false;

    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
    function setErr(id, msg)  { document.getElementById(id).textContent = msg; }
    function setInfo(id, msg) { document.getElementById(id).textContent = msg; }

    // ── Auth check ─────────────────────────────────────────────
    onAuthStateChanged(auth, (user) => {
      if (user) {
        show('sectionAlunos');
      } else {
        location.href = './administrativo.html';
      }
    });

    // ── Carregar alunos ────────────────────────────────────────
    async function carregarAlunos(forcar = false) {
      if (!forcar) {
        const cached = lerCacheAlunos();
        if (cached) {
          todosAlunos = cached;
          setInfo('listInfo', '');
          renderListaFiltrada();
          return;
        }
      }
      setInfo('listInfo', 'Carregando alunos…');
      document.getElementById('listaAlunos').innerHTML = '';
      try {
        const q = query(collection(db, 'alunos'), orderBy('nome_aluno'));
        const snap = await getDocs(q);
        todosAlunos = snap.docs.map(d => {
          const a = d.data();
          return {
            id:              d.id,
            nome_aluno:      a.nome_aluno || '',
            email:           a.email || '',
            status:          a.status || 'ATIVO',
            faixa:           a.faixa || '',
            grau_atual:      a.grau_atual ?? 0,
            aulas_no_grau:   a.aulas_no_grau ?? 0,
            aulas_restantes: a.aulas_restantes ?? 0,
            meta_grau:       a.meta_grau ?? 0,
            data_ultimo_grau: a.data_ultimo_grau || '',
            telefone:        a.telefone || '',
            cpf:             a.cpf || '',
            data_nasc:       a.data_nasc || '',
            categoria:       a.categoria || '',
            plano:           a.plano || '',
          };
        });
        salvarCacheAlunos(todosAlunos);
        setInfo('listInfo', '');
        renderListaFiltrada();
      } catch (e) {
        setInfo('listInfo', 'Erro de conexão. Tente novamente.');
      }
    }

    // ── Renderizar lista filtrada ──────────────────────────────
    function renderListaFiltrada() {
      const q = document.getElementById('searchBox').value.trim().toLowerCase();
      if (!q) {
        renderLista(todosAlunos);
      } else {
        renderLista(todosAlunos.filter(a =>
          (a.nome_aluno || '').toLowerCase().includes(q) ||
          (a.cpf || '').includes(q)
        ));
      }
    }

    // ── Renderizar lista ───────────────────────────────────────
    function renderLista(alunos) {
      const container = document.getElementById('listaAlunos');
      if (!alunos.length) {
        container.innerHTML = '<p class="lista-vazia">Nenhum aluno encontrado.</p>';
        return;
      }
      container.innerHTML = alunos.map(a => {
        const id        = esc(String(a.id));
        const cat       = esc(a.categoria || '—');
        const aulas     = esc(String(a.aulas_no_grau ?? '—'));
        const restantes = esc(String(a.aulas_restantes ?? '—'));
        const dataGrau  = esc(formatarData(a.data_ultimo_grau));
        const tel       = esc(a.telefone || '—');
        const cpf       = esc(a.cpf || '—');
        const nasc      = esc(formatarData(a.data_nasc));
        return `
        <div class="aluno-card" id="card-${id}">
          <div class="aluno-header">
            <div>
              <div class="aluno-nome">${esc(a.nome_aluno)}</div>
              <div class="aluno-email">${esc(a.email || '—')}</div>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0;">
              <button class="btn-faixa"
                data-id="${id}"
                id="btnFaixa-${id}">
                Trocar Faixa
              </button>
              <button class="btn-toggle"
                data-id="${id}"
                data-status="${esc(a.status)}"
                id="btn-${id}">
                ${a.status === 'ATIVO' ? 'Desativar' : 'Ativar'}
              </button>
            </div>
          </div>
          <div class="aluno-meta">
            <span class="aluno-faixa" id="faixaLabel-${id}">${esc(a.faixa || '—')} G${esc(String(a.grau_atual ?? '—'))}</span>
            <span class="${a.status === 'ATIVO' ? 'badge-ativo' : 'badge-inativo'}" id="badge-${id}">
              ${esc(a.status || '—')}
            </span>
          </div>
          <div class="aluno-detalhes" id="detalhes-${id}">
            <div class="detalhe-row"><span class="detalhe-label">Categoria</span><span class="detalhe-valor">${cat}</span></div>
            <div class="detalhe-row"><span class="detalhe-label">Aulas no Grau</span><span class="detalhe-valor">${aulas}</span></div>
            <div class="detalhe-row"><span class="detalhe-label">Aulas Restantes</span><span class="detalhe-valor">${restantes}</span></div>
            <div class="detalhe-row"><span class="detalhe-label">Último Grau</span><span class="detalhe-valor">${dataGrau}</span></div>
            <div class="detalhe-row"><span class="detalhe-label">Telefone</span><span class="detalhe-valor">${tel}</span></div>
            <div class="detalhe-row"><span class="detalhe-label">CPF</span><span class="detalhe-valor">${cpf}</span></div>
            <div class="detalhe-row full-width"><span class="detalhe-label">Nascimento</span><span class="detalhe-valor">${nasc}</span></div>
          </div>
          <div class="aluno-financeiro" id="fin-${id}">
            <div class="fin-header">💰 Financeiro</div>
            <div class="fin-grid">
              <div class="fin-item">
                <span class="fin-label">PLANO</span>
                <span class="fin-valor" id="finPlano-${id}">${esc(a.plano || '—')}</span>
              </div>
              <div class="fin-item">
                <span class="fin-label">STATUS</span>
                <span class="fin-valor fin-status" id="finStatus-${id}">—</span>
              </div>
              <div class="fin-item">
                <span class="fin-label">PRÓX. VENCIMENTO</span>
                <span class="fin-valor" id="finVenc-${id}">—</span>
              </div>
              <div class="fin-item">
                <span class="fin-label">VALOR</span>
                <span class="fin-valor" id="finValor-${id}">—</span>
              </div>
            </div>
            <div class="fin-acoes">
              <button class="btn-fin primary" data-id="${id}">+ Registrar Pagamento</button>
              <button class="btn-fin secondary" data-id="${id}">📋 Histórico</button>
            </div>
            <p class="fin-msg" id="finMsg-${id}"></p>
          </div>
          <div class="trocar-faixa-inline" id="trocaFaixaArea-${id}" style="display:none;">
            <select id="selectFaixa-${id}">
              <optgroup label="── Adulto ──">
                <option value="Branca">Branca</option>
                <option value="Azul">Azul</option>
                <option value="Roxa">Roxa</option>
                <option value="Marrom">Marrom</option>
                <option value="Preta">Preta</option>
              </optgroup>
              <optgroup label="── Kids / Infantil / Juvenil ──">
                <option value="Cinza e Branca">Cinza e Branca</option>
                <option value="Cinza">Cinza</option>
                <option value="Cinza e Preta">Cinza e Preta</option>
                <option value="Amarela e Branca">Amarela e Branca</option>
                <option value="Amarela">Amarela</option>
                <option value="Amarela e Preta">Amarela e Preta</option>
                <option value="Laranja e Branca">Laranja e Branca</option>
                <option value="Laranja">Laranja</option>
                <option value="Laranja e Preta">Laranja e Preta</option>
                <option value="Verde e Branca">Verde e Branca</option>
                <option value="Verde">Verde</option>
                <option value="Verde e Preta">Verde e Preta</option>
              </optgroup>
            </select>
            <button class="btn-confirmar-faixa" data-id="${id}">Confirmar</button>
            <button class="btn-cancelar-faixa" data-id="${id}">Cancelar</button>
          </div>
        </div>
      `}).join('');
    }

    // ── Filtro de busca ────────────────────────────────────────
    document.getElementById('searchBox').addEventListener('input', async (e) => {
      const q = e.target.value.trim().toLowerCase();
      if (!listaCarregada && q.length >= 3) {
        await carregarAlunos();
        listaCarregada = true;
      }
      if (listaCarregada) renderListaFiltrada();
    });

    document.getElementById('btnVerTodos').addEventListener('click', async () => {
      if (!listaCarregada) {
        await carregarAlunos();
        listaCarregada = true;
      } else {
        renderListaFiltrada();
      }
    });

    document.getElementById('btnAtualizar').addEventListener('click', async () => {
      invalidarCacheAlunos();
      listaCarregada = false;
      todosAlunos = [];
      await carregarAlunos(true);
      listaCarregada = true;
    });

    // ── Event delegation para botões ───────────────────────────
    document.getElementById('listaAlunos').addEventListener('click', (e) => {
      const btnToggle = e.target.closest('.btn-toggle');
      if (btnToggle) {
        const id     = btnToggle.dataset.id;
        const status = btnToggle.dataset.status;
        if (id && status) toggleStatus(id, status);
        return;
      }

      const btnFaixa = e.target.closest('.btn-faixa');
      if (btnFaixa) {
        const id   = btnFaixa.dataset.id;
        const area = document.getElementById('trocaFaixaArea-' + id);
        if (area) area.style.display = area.style.display === 'none' ? 'flex' : 'none';
        return;
      }

      const btnConfirmar = e.target.closest('.btn-confirmar-faixa');
      if (btnConfirmar) {
        const id        = btnConfirmar.dataset.id;
        const novaFaixa = document.getElementById('selectFaixa-' + id).value;
        trocarFaixa(id, novaFaixa);
        return;
      }

      const btnCancelar = e.target.closest('.btn-cancelar-faixa');
      if (btnCancelar) {
        const id   = btnCancelar.dataset.id;
        const area = document.getElementById('trocaFaixaArea-' + id);
        if (area) area.style.display = 'none';
        return;
      }
    });

    // ── Toggle status ──────────────────────────────────────────
    async function toggleStatus(id, statusAtual) {
      const novoStatus = statusAtual === 'ATIVO' ? 'INATIVO' : 'ATIVO';
      const btn   = document.getElementById('btn-' + id);
      const badge = document.getElementById('badge-' + id);

      const aluno = todosAlunos.find(a => String(a.id) === String(id));
      if (aluno) aluno.status = novoStatus;
      if (btn) {
        btn.textContent    = novoStatus === 'ATIVO' ? 'Desativar' : 'Ativar';
        btn.dataset.status = novoStatus;
        btn.disabled       = true;
      }
      if (badge) {
        badge.textContent = novoStatus;
        badge.className   = novoStatus === 'ATIVO' ? 'badge-ativo' : 'badge-inativo';
      }

      try {
        await updateDoc(doc(db, 'alunos', id), { status: novoStatus });
        salvarCacheAlunos(todosAlunos);
      } catch (e) {
        if (aluno) aluno.status = statusAtual;
        if (btn) { btn.textContent = statusAtual === 'ATIVO' ? 'Desativar' : 'Ativar'; btn.dataset.status = statusAtual; }
        if (badge) { badge.textContent = statusAtual; badge.className = statusAtual === 'ATIVO' ? 'badge-ativo' : 'badge-inativo'; }
        alert('Erro ao alterar status.');
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    // ── Trocar faixa ───────────────────────────────────────────
    async function trocarFaixa(id, novaFaixa) {
      const btnF  = document.getElementById('btnFaixa-' + id);
      const area  = document.getElementById('trocaFaixaArea-' + id);
      const label = document.getElementById('faixaLabel-' + id);
      if (btnF) btnF.disabled = true;

      try {
        await updateDoc(doc(db, 'alunos', id), {
          faixa: novaFaixa,
          grau_atual: 0,
          aulas_no_grau: 0,
          data_ultimo_grau: new Date().toISOString().slice(0, 10),
        });
        const aluno = todosAlunos.find(a => String(a.id) === String(id));
        if (aluno) { aluno.faixa = novaFaixa; aluno.grau_atual = 0; }
        salvarCacheAlunos(todosAlunos);
        if (label) label.textContent = novaFaixa + ' G0';
        if (area) area.style.display = 'none';
      } catch (e) {
        alert('Erro ao trocar faixa.');
      } finally {
        if (btnF) btnF.disabled = false;
      }
    }

    // ── Escape HTML ────────────────────────────────────────────
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ── Formatar data YYYY-MM-DD → DD/MM/YYYY ─────────────────
    function formatarData(val) {
      if (!val || String(val).trim() === '' || String(val).trim() === 'undefined') return '—';
      var s = String(val).trim();
      if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
        var parts = s.substring(0, 10).split('-');
        return parts[2] + '/' + parts[1] + '/' + parts[0];
      }
      return s;
    }

    document.getElementById('btnHdrSair').addEventListener('click', () => {
      signOut(auth).catch(() => {});
      sessionStorage.removeItem(TOKEN_KEY);
      location.href = './administrativo.html';
    });
  </script>
