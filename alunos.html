<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c0392b" />
  <title>Alunos – Riva BJJ</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .aluno-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .aluno-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .aluno-nome {
      font-size: 17px;
      font-weight: 900;
      color: #fff;
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }
    .aluno-email {
      font-size: 13px;
      color: #aaa;
      margin-top: 2px;
      word-break: break-all;
    }
    .aluno-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .aluno-faixa {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      background: #2a2a2a;
      border-radius: 8px;
      padding: 3px 10px;
    }
    .badge-ativo {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
    }
    .badge-inativo {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 999px;
      background: var(--red);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
    }
    .btn-toggle {
      background: #222;
      border: 1px solid #333;
      color: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-toggle:active { opacity: .75; }
    #searchBox {
      margin-bottom: 14px;
    }
    .lista-vazia {
      color: #aaa;
      text-align: center;
      padding: 24px 0;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <header class="hdr">
    <div class="hdr-inner">
      <img class="logo" src="./logo.png" alt="Riva BJJ" />
    </div>
  </header>

  <main class="page">

    <!-- ── SENHA ──────────────────────────────────────────────── -->
    <section class="card" id="cardSenha">
      <h1 class="title">Acesso Restrito</h1>
      <label class="label" for="senha">Senha do Professor</label>
      <input id="senha" class="input" type="password" placeholder="Digite a senha" autocomplete="current-password" />
      <button class="btn primary" id="btnEntrar">Entrar</button>
      <p class="msg err" id="senhaErr"></p>
      <p class="msg info" id="senhaInfo"></p>
    </section>

    <!-- ── LISTA ──────────────────────────────────────────────── -->
    <section class="hidden" id="sectionAlunos">
      <div class="card">
        <h1 class="title">Alunos</h1>
        <input id="searchBox" class="input" type="search" placeholder="Buscar por nome…" />
        <p class="msg info" id="listInfo"></p>
      </div>

      <div id="listaAlunos"></div>

      <div class="card">
        <button class="btn secondary" onclick="location.href='./cadastroaluno.html'">+ Cadastrar Aluno</button>
        <button class="btn secondary" onclick="location.href='./index.html'">← Voltar ao Início</button>
      </div>
    </section>

  </main>

  <script>
    const API_BASE       = 'https://script.google.com/macros/s/AKfycbyBLlVjEvO35RufIh6pH9XOOTDXuj_BMrNHAJfdw9I-reScWX31dsVdOFJna1ZbJVqX/exec';
    const API_TIMEOUT_MS = 25000;
    const TOKEN_KEY      = 'rv_prof_token';

    let todosAlunos = [];

    function apiCall(params) {
      return new Promise((resolve, reject) => {
        const cb = '_rv' + Date.now() + Math.floor(Math.random() * 9999);
        const s  = document.createElement('script');
        const t  = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, API_TIMEOUT_MS);
        function cleanup() { clearTimeout(t); delete window[cb]; s.remove(); }
        window[cb] = (d) => { cleanup(); resolve(d); };
        s.onerror  = () => { cleanup(); reject(new Error('net')); };
        const qs = Object.entries(params).map(([k, v]) => `${k}=${encodeURIComponent(v)}`).join('&');
        s.src = `${API_BASE}?${qs}&callback=${cb}`;
        document.head.appendChild(s);
      });
    }

    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
    function setErr(id, msg)  { document.getElementById(id).textContent = msg; }
    function setInfo(id, msg) { document.getElementById(id).textContent = msg; }

    // ── Init ───────────────────────────────────────────────────
    function init() {
      const token = sessionStorage.getItem(TOKEN_KEY);
      if (token) {
        hide('cardSenha');
        show('sectionAlunos');
        carregarAlunos();
      }
    }

    // ── Verificar senha ────────────────────────────────────────
    document.getElementById('btnEntrar').addEventListener('click', async () => {
      const senha = document.getElementById('senha').value.trim();
      if (!senha) { setErr('senhaErr', 'Digite a senha.'); return; }
      setErr('senhaErr', '');
      setInfo('senhaInfo', 'Verificando…');
      document.getElementById('btnEntrar').disabled = true;
      try {
        const r = await apiCall({ action: 'verificarSenha', senha });
        if (r && r.ok) {
          sessionStorage.setItem(TOKEN_KEY, r.token || '1');
          setInfo('senhaInfo', '');
          hide('cardSenha');
          show('sectionAlunos');
          carregarAlunos();
        } else {
          setErr('senhaErr', r && r.erro ? r.erro : 'Senha incorreta.');
          setInfo('senhaInfo', '');
        }
      } catch (e) {
        setErr('senhaErr', 'Erro de conexão. Tente novamente.');
        setInfo('senhaInfo', '');
      } finally {
        document.getElementById('btnEntrar').disabled = false;
      }
    });

    document.getElementById('senha').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btnEntrar').click();
    });

    // ── Carregar alunos ────────────────────────────────────────
    async function carregarAlunos() {
      setInfo('listInfo', 'Carregando alunos…');
      document.getElementById('listaAlunos').innerHTML = '';
      try {
        const r = await apiCall({
          action: 'listarAlunos',
          token:  sessionStorage.getItem(TOKEN_KEY) || '',
        });
        if (r && r.ok && Array.isArray(r.alunos)) {
          todosAlunos = r.alunos;
          setInfo('listInfo', '');
          renderLista(todosAlunos);
        } else {
          setInfo('listInfo', r && r.erro ? r.erro : 'Erro ao carregar alunos.');
        }
      } catch (e) {
        setInfo('listInfo', 'Erro de conexão. Tente novamente.');
      }
    }

    // ── Renderizar lista ───────────────────────────────────────
    function renderLista(alunos) {
      const container = document.getElementById('listaAlunos');
      if (!alunos.length) {
        container.innerHTML = '<p class="lista-vazia">Nenhum aluno encontrado.</p>';
        return;
      }
      container.innerHTML = alunos.map(a => `
        <div class="aluno-card" id="card-${a.id}">
          <div class="aluno-header">
            <div>
              <div class="aluno-nome">${esc(a.nome_aluno)}</div>
              <div class="aluno-email">${esc(a.email || '—')}</div>
            </div>
            <button class="btn-toggle"
              onclick="toggleStatus('${esc(a.id)}', '${esc(a.status)}')"
              id="btn-${a.id}">
              ${a.status === 'ATIVO' ? 'Desativar' : 'Ativar'}
            </button>
          </div>
          <div class="aluno-meta">
            <span class="aluno-faixa">${esc(a.faixa || '—')} G${esc(String(a.grau_atual ?? '—'))}</span>
            <span class="${a.status === 'ATIVO' ? 'badge-ativo' : 'badge-inativo'}" id="badge-${a.id}">
              ${esc(a.status || '—')}
            </span>
          </div>
        </div>
      `).join('');
    }

    // ── Filtro de busca ────────────────────────────────────────
    document.getElementById('searchBox').addEventListener('input', (e) => {
      const q = e.target.value.trim().toLowerCase();
      if (!q) { renderLista(todosAlunos); return; }
      renderLista(todosAlunos.filter(a =>
        (a.nome_aluno || '').toLowerCase().includes(q)
      ));
    });

    // ── Toggle status (otimista) ────────────────────────────────
    async function toggleStatus(id, statusAtual) {
      const novoStatus = statusAtual === 'ATIVO' ? 'INATIVO' : 'ATIVO';
      const btn   = document.getElementById('btn-' + id);
      const badge = document.getElementById('badge-' + id);

      // Optimistic UI update
      const aluno = todosAlunos.find(a => String(a.id) === String(id));
      if (aluno) aluno.status = novoStatus;
      if (btn)   { btn.textContent = novoStatus === 'ATIVO' ? 'Desativar' : 'Ativar'; btn.disabled = true; }
      if (badge) {
        badge.textContent = novoStatus;
        badge.className   = novoStatus === 'ATIVO' ? 'badge-ativo' : 'badge-inativo';
      }
      // Update onclick with new status
      if (btn) btn.setAttribute('onclick', `toggleStatus('${id}', '${novoStatus}')`);

      try {
        const r = await apiCall({
          action:    'alterarStatusAluno',
          token:     sessionStorage.getItem(TOKEN_KEY) || '',
          id,
          status:    novoStatus,
        });
        if (!r || !r.ok) {
          // Revert on failure
          if (aluno) aluno.status = statusAtual;
          if (btn)   { btn.textContent = statusAtual === 'ATIVO' ? 'Desativar' : 'Ativar'; }
          if (btn)   btn.setAttribute('onclick', `toggleStatus('${id}', '${statusAtual}')`);
          if (badge) {
            badge.textContent = statusAtual;
            badge.className   = statusAtual === 'ATIVO' ? 'badge-ativo' : 'badge-inativo';
          }
          alert(r && r.erro ? r.erro : 'Erro ao alterar status.');
        }
      } catch (e) {
        // Revert on error
        if (aluno) aluno.status = statusAtual;
        if (btn)   { btn.textContent = statusAtual === 'ATIVO' ? 'Desativar' : 'Ativar'; }
        if (btn)   btn.setAttribute('onclick', `toggleStatus('${id}', '${statusAtual}')`);
        if (badge) {
          badge.textContent = statusAtual;
          badge.className   = statusAtual === 'ATIVO' ? 'badge-ativo' : 'badge-inativo';
        }
        alert('Erro de conexão.');
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    // ── Escape HTML ────────────────────────────────────────────
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    init();
  </script>
</body>
</html>
