<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c0392b" />
  <title>Financeiro – Riva BJJ</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    /* ── Header desktop compacto ── */
    .admin-hdr-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .admin-hdr-titulo { display: none; }
    .admin-hdr-sair { display: none; }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-logout:active { opacity: .75; }
    .admin-logo {
      width: 56px !important;
      height: 56px !important;
      margin-top: 0 !important;
    }
    @media (min-width: 769px) {
      .admin-hdr-inner {
        max-width: 1100px;
        justify-content: space-between;
        padding: 0 24px;
      }
      .admin-logo {
        width: 64px !important;
        height: 64px !important;
        margin-top: 0 !important;
      }
      .admin-hdr-titulo {
        display: inline;
        font-size: 20px;
        font-weight: 900;
        color: #fff;
        letter-spacing: 0.5px;
      }
      .admin-hdr-sair { display: inline-block; }
      .admin-page { max-width: 1100px; padding: 32px 32px 64px; }
    }
    @media (max-width: 768px) {
      .admin-hdr-inner { justify-content: center; }
    }

    /* ── Resumo financeiro ── */
    .resumo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .resumo-item {
      background: #141414;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
    }
    .resumo-valor {
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      line-height: 1.1;
    }
    .resumo-label {
      font-size: 11px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }
    .resumo-valor.verde  { color: #2ecc71; }
    .resumo-valor.amarelo{ color: #f39c12; }
    .resumo-valor.azul   { color: #3498db; }

    /* ── Filtros ── */
    .filtros-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .btn-filtro {
      background: #222;
      border: 1px solid #444;
      color: #aaa;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn-filtro.ativo { background: var(--red); color: #fff; border-color: var(--red); }
    .btn-filtro:active { opacity: .75; }

    /* ── Card de aluno ── */
    .fin-aluno-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .fin-aluno-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .fin-aluno-nome {
      font-size: 16px;
      font-weight: 900;
      color: #fff;
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }
    .status-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .status-pago    { background: rgba(46,204,113,.2);  color: #2ecc71; border: 1px solid #2ecc71; }
    .status-pendente{ background: rgba(243,156,18,.15); color: #f39c12; border: 1px solid #f39c12; }
    .status-vencido { background: rgba(231,76,60,.2);   color: #e74c3c; border: 1px solid #e74c3c; }

    .fin-aluno-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 16px;
      margin-top: 10px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .fin-info-item { display: flex; flex-direction: column; gap: 2px; }
    .fin-info-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
    .fin-info-valor { font-size: 14px; color: #fff; font-weight: 700; }

    /* ── Chips ── */
    .chip-carencia {
      display: inline-block;
      background: rgba(243,156,18,.2);
      color: #f39c12;
      border: 1px solid #f39c12;
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 700;
      margin-top: 6px;
      margin-right: 4px;
    }
    .desconto-tag {
      background: rgba(52,152,219,.2);
      color: #3498db;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      font-weight: 700;
      margin-left: 4px;
    }
    .asaas-badge {
      display: inline-block;
      background: rgba(52,152,219,.15);
      color: #3498db;
      border: 1px solid #3498db;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
    }

    /* ── Botões de ação no card ── */
    .btns-acao {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .btn-acao {
      background: #2a2a2a;
      border: 1px solid #444;
      color: #ddd;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      display: inline-block;
    }
    .btn-acao:active { opacity: .75; }
    .btn-acao:disabled { opacity: .5; cursor: not-allowed; }
    .btn-acao.blue  { background: rgba(52,152,219,.2);  border-color: #3498db; color: #3498db; }
    .btn-acao.green { background: rgba(39,174,96,.2);   border-color: #27ae60; color: #2ecc71; }
    .btn-acao.orange{ background: rgba(243,156,18,.15); border-color: #f39c12; color: #f39c12; }
    .btn-acao.red   { background: rgba(231,76,60,.15);  border-color: #e74c3c; color: #e74c3c; }

    /* ── Select input ── */
    .select-input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border-radius: 12px;
      background: #222;
      border: 2px solid #333;
      color: #fff;
      outline: none;
      margin-bottom: 12px;
      appearance: none;
      -webkit-appearance: none;
    }
    .select-input:focus { border-color: var(--red); }

    /* ── Busca sticky ── */
    .busca-fixa {
      position: sticky;
      top: 72px;
      z-index: 9;
      background: var(--bg);
      padding: 12px 0 4px;
      margin-bottom: 8px;
    }
    @media (max-width: 768px) { .busca-fixa { top: 68px; } }
    .busca-fixa .input { margin-bottom: 8px; }

    /* ── Rodapé fixo ── */
    .rodape-fixo {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 20;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
    }
    .rodape-fixo .btn {
      margin-top: 0;
      max-width: 520px;
      margin-left: auto; margin-right: auto;
      display: block;
    }
    @media (min-width: 769px) { .rodape-fixo .btn { max-width: 1100px; } }

    .lista-scroll { padding-bottom: 90px; }
    .lista-vazia { color: #aaa; text-align: center; padding: 24px 0; font-size: 15px; }

    /* ── Seletor mês/ano ── */
    .mes-selector {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .mes-selector .select-input { margin-bottom: 0; flex: 1; }
    .mes-selector .btn-mes {
      background: var(--red);
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }
    .mes-selector .btn-mes:active { opacity: .75; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 50;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 20px 16px calc(20px + env(safe-area-inset-bottom, 0px));
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
    }
    @media (min-width: 769px) {
      .modal-overlay { align-items: center; }
      .modal-box { border-radius: 20px; max-width: 480px; max-height: 85vh; }
    }
    .modal-title   { font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 4px; }
    .modal-subtitle{ font-size: 13px; color: #aaa; margin-bottom: 16px; }
    .modal-btns    { display: flex; gap: 10px; margin-top: 4px; }
    .modal-btns .btn { margin-top: 0; flex: 1; }

    /* ── Valor final box ── */
    .valor-final-box {
      background: #222;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 4px;
      margin-bottom: 12px;
    }
    .valor-final-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
    .valor-final-num   { font-size: 22px; font-weight: 900; color: #fff; margin-top: 2px; }

    /* ── QR Code ── */
    .qr-container { text-align: center; padding: 12px 0; }
    .qr-container img { max-width: 180px; border-radius: 8px; border: 1px solid #333; }
    .pix-copia-cola {
      background: #222;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      font-family: monospace;
      font-size: 11px;
      color: #aaa;
      word-break: break-all;
      margin-top: 8px;
      text-align: left;
    }
    .btn-copiar {
      margin-top: 8px;
      background: #3498db;
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    .btn-copiar:active { opacity: .75; }

    /* ── Sucesso vincular ── */
    .vincular-sucesso { text-align: center; padding: 16px 0 8px; }
    .vincular-sucesso-icon { font-size: 36px; }
    .vincular-sucesso-text { font-size: 16px; font-weight: 700; color: #2ecc71; margin-top: 8px; }

    /* ── Checkbox label ── */
    .check-label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ddd;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      cursor: pointer;
    }
    .check-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--red);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header class="hdr admin-hdr">
    <div class="hdr-inner admin-hdr-inner">
      <div class="admin-hdr-left">
        <img class="logo admin-logo" src="./logo.png" alt="Riva BJJ" />
        <span class="admin-hdr-titulo">Financeiro</span>
      </div>
      <button class="btn-logout admin-hdr-sair" id="btnHdrSair">Sair</button>
    </div>
  </header>

  <main class="page admin-page">
    <section class="hidden" id="sectionFinanceiro">

      <div class="busca-fixa">
        <h1 class="title" style="margin-bottom:10px;">💰 Financeiro</h1>
        <div class="mes-selector">
          <select class="select-input" id="selMes">
            <option value="1">Janeiro</option>
            <option value="2">Fevereiro</option>
            <option value="3">Março</option>
            <option value="4">Abril</option>
            <option value="5">Maio</option>
            <option value="6">Junho</option>
            <option value="7">Julho</option>
            <option value="8">Agosto</option>
            <option value="9">Setembro</option>
            <option value="10">Outubro</option>
            <option value="11">Novembro</option>
            <option value="12">Dezembro</option>
          </select>
          <select class="select-input" id="selAno" style="max-width:100px;"></select>
          <button class="btn-mes" id="btnCarregar">Carregar</button>
        </div>

        <input id="searchBox" class="input" type="search" placeholder="Buscar por nome…" />

        <div class="filtros-row">
          <button class="btn-filtro ativo" data-filtro="todos">Todos</button>
          <button class="btn-filtro" data-filtro="pago">✅ Pagos</button>
          <button class="btn-filtro" data-filtro="pendente">⏳ Pendentes</button>
          <button class="btn-filtro" data-filtro="vencido">❌ Vencidos</button>
        </div>

        <p class="msg info" id="listInfo"></p>
      </div>

      <div class="resumo-grid" id="resumoGrid" style="display:none;">
        <div class="resumo-item">
          <div class="resumo-valor verde" id="resumoArrecadado">R$ 0</div>
          <div class="resumo-label">Arrecadado</div>
        </div>
        <div class="resumo-item">
          <div class="resumo-valor amarelo" id="resumoPendente">R$ 0</div>
          <div class="resumo-label">Pendente</div>
        </div>
        <div class="resumo-item">
          <div class="resumo-valor azul" id="resumoEmDia">0</div>
          <div class="resumo-label">Em dia</div>
        </div>
      </div>

      <div id="listaAlunos" class="lista-scroll"></div>

      <div class="rodape-fixo">
        <button class="btn secondary" onclick="location.href='./administrativo.html'">← Voltar ao Portal</button>
      </div>
    </section>
  </main>

  <!-- ── MODAL REGISTRO MANUAL DE PAGAMENTO ── -->
  <div class="modal-overlay" id="modalPagamento">
    <div class="modal-box">
      <div class="modal-title">Registrar Pagamento</div>
      <div class="modal-subtitle" id="modalAlunoNome"></div>
      <input type="hidden" id="modalAlunoId" />

      <label class="label" for="fValor">Valor (R$)</label>
      <input id="fValor" class="input" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00" />

      <label class="label" for="fData">Data do Pagamento</label>
      <input id="fData" class="input" type="date" />

      <label class="label" for="fFormaPag">Forma de Pagamento</label>
      <select id="fFormaPag" class="select-input">
        <option value="dinheiro">💵 Dinheiro</option>
        <option value="debito">💳 Débito</option>
        <option value="pix">📲 Pix</option>
        <option value="cartao">💳 Cartão</option>
      </select>

      <p class="msg err" id="modalErr"></p>
      <p class="msg info" id="modalInfo"></p>

      <div class="modal-btns">
        <button class="btn secondary" id="btnCancelarModal">Cancelar</button>
        <button class="btn primary" id="btnConfirmarPag">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- ── MODAL VINCULAR AO ASAAS ── -->
  <div class="modal-overlay" id="modalVincular">
    <div class="modal-box">
      <div class="modal-title">🔗 Vincular ao Asaas</div>
      <div class="modal-subtitle" id="vincularNome"></div>
      <input type="hidden" id="vincularAlunoId" />

      <!-- Step 1: Formulário -->
      <div id="vincularFormWrap">
        <label class="label" for="vincularPlano">Plano</label>
        <select class="select-input" id="vincularPlano">
          <option value="Recorrente">Recorrente – R$ 200,00</option>
          <option value="Semestral">Semestral – R$ 220,00</option>
          <option value="Mensal">Mensal – R$ 240,00</option>
        </select>

        <div id="vincularFormaPagWrap" style="display:none;">
          <label class="label" for="vincularFormaPag">Forma de Pagamento</label>
          <select class="select-input" id="vincularFormaPag">
            <option value="PIX">📲 Pix</option>
            <option value="BOLETO">📄 Boleto</option>
          </select>
        </div>

        <label class="label" for="vincularDataContrato">Data de início do contrato</label>
        <input type="date" class="input" id="vincularDataContrato" style="margin-bottom:12px;" />

        <label class="check-label">
          <input type="checkbox" id="vincularDesconto" />
          Desconto família 10%
        </label>

        <div class="valor-final-box">
          <div class="valor-final-label">Valor final</div>
          <div class="valor-final-num" id="vincularValorFinal">R$ 0,00</div>
        </div>

        <p class="msg err" id="vincularErr"></p>
        <p class="msg info" id="vincularInfo"></p>

        <div class="modal-btns">
          <button class="btn secondary" id="btnCancelarVincular">Cancelar</button>
          <button class="btn primary" id="btnCriarAsaas">Criar no Asaas</button>
        </div>
      </div>

      <!-- Step 2: Sucesso -->
      <div id="vincularSuccessWrap" style="display:none;">
        <div class="vincular-sucesso">
          <div class="vincular-sucesso-icon">✅</div>
          <div class="vincular-sucesso-text">Vinculado com sucesso!</div>
        </div>

        <div id="vincularQrWrap" style="display:none;">
          <div style="font-size:13px;color:#aaa;text-align:center;margin-bottom:4px;">QR Code Pix</div>
          <div class="qr-container">
            <img id="vincularQrImg" src="" alt="QR Code Pix" />
          </div>
          <div class="pix-copia-cola" id="vincularPixKey"></div>
          <button class="btn-copiar" id="btnCopiarPix">📋 Copiar código Pix</button>
        </div>

        <button class="btn primary" id="btnVincularWhatsapp" style="display:none;background:#25D366;margin-top:12px;">💬 Enviar via WhatsApp</button>
        <button class="btn secondary" style="margin-top:8px;" id="btnFecharVincular">Fechar</button>
      </div>
    </div>
  </div>

  <script type="module">
    // ── CONFIGURAÇÃO ────────────────────────────────────────────────────────
    // IMPORTANTE: Substitua 'SUA_URL_DO_GAS_AQUI' pela URL real do Google
    // Apps Script deployado como Web App (Executar como: Eu, Acesso: Qualquer
    // pessoa). Ex.: https://script.google.com/macros/s/AKfy.../exec
    const GAS_URL = 'SUA_URL_DO_GAS_AQUI';

    import { db, auth } from './firebase-config.js';
    import {
      collection, doc, query, where, getDocs,
      addDoc, updateDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const TOKEN_KEY        = 'rv_prof_token';
    const CACHE_KEY_FIN    = 'rv_fin_cache';
    const CACHE_TTL_FIN    = 5 * 60 * 1000; // 5 minutos
    const DIA_VENCIMENTO   = 10;             // dia do mês em que a mensalidade vence

    // ── Estado ─────────────────────────────────────────────────────────────
    let todosRegistros = [];
    let filtroAtivo    = 'todos';
    let mesSelecionado = new Date().getMonth() + 1;
    let anoSelecionado = new Date().getFullYear();
    // Status live do Asaas (por alunoId), atualizado ao clicar "Sincronizar"
    const asaasStatusMap = {};

    // ── Cache ───────────────────────────────────────────────────────────────
    function salvarCache(mes, ano, dados) {
      try {
        localStorage.setItem(CACHE_KEY_FIN + '_' + mes + '_' + ano,
          JSON.stringify({ ts: Date.now(), dados }));
      } catch(e) {}
    }
    function lerCache(mes, ano) {
      try {
        const c = JSON.parse(localStorage.getItem(CACHE_KEY_FIN + '_' + mes + '_' + ano) || 'null');
        if (c && Date.now() - c.ts < CACHE_TTL_FIN) return c.dados;
      } catch(e) {}
      return null;
    }
    function invalidarCache(mes, ano) {
      try { localStorage.removeItem(CACHE_KEY_FIN + '_' + mes + '_' + ano); } catch(e) {}
    }

    // ── Helpers ─────────────────────────────────────────────────────────────
    function valorDePlano(plano) {
      if (!plano) return 0;
      const p = plano.toLowerCase();
      if (p.includes('recorrente')) return 200;
      if (p.includes('semestral'))  return 220;
      if (p.includes('mensal'))     return 240;
      return 0;
    }
    function detectarDesconto(a) {
      if (!a.grupo_familiar || !a.grupo_familiar.trim()) return false;
      const gf = a.grupo_familiar.trim().toLowerCase();
      return todosRegistros.filter(r =>
        r.grupo_familiar && r.grupo_familiar.trim().toLowerCase() === gf
      ).length >= 2;
    }
    function calcularValorFinal(a) {
      const base = valorDePlano(a.plano);
      return detectarDesconto(a) ? Math.round(base * 0.9 * 100) / 100 : base;
    }
    function getEffectiveStatus(a) {
      const live = asaasStatusMap[a.id];
      if (live && live.status) {
        if (live.status === 'CONFIRMED' || live.status === 'RECEIVED') return 'pago';
        if (live.status === 'OVERDUE') return 'vencido';
        return 'pendente';
      }
      return a.statusPagamento || 'pendente';
    }
    function formatData(s) {
      if (!s) return '—';
      if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
        const p = s.substring(0, 10).split('-');
        return p[2] + '/' + p[1] + '/' + p[0];
      }
      return s;
    }
    function formatDataBR(d) {
      return String(d.getDate()).padStart(2,'0') + '/' +
             String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
    }
    function formatFormaPag(f) {
      if (!f) return '—';
      return { dinheiro:'💵 Dinheiro', debito:'💳 Débito', pix:'📲 Pix', cartao:'💳 Cartão' }[f.toLowerCase()] || f;
    }
    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(s) {
      return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    }
    function show(id) { document.getElementById(id).classList.remove('hidden'); }

    // Retorna telefone limpo (só dígitos, 10-11 chars) ou null se inválido
    function validarTelefone(tel) {
      const t = (tel || '').replace(/\D/g, '');
      return (t.length >= 10 && t.length <= 11) ? t : null;
    }

    // ── GAS helper ──────────────────────────────────────────────────────────
    async function gasCall(action, params) {
      if (!GAS_URL || GAS_URL.includes('SUA_URL')) {
        throw new Error('GAS_URL não configurada. Edite o financeiro.html e substitua SUA_URL_DO_GAS_AQUI pela URL do Apps Script deployado.');
      }
      const qs = Object.entries(Object.assign({ action }, params || {}))
        .map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(String(v)))
        .join('&');
      const resp = await fetch(GAS_URL + '?' + qs);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return resp.json();
    }

    // ── Auth ────────────────────────────────────────────────────────────────
    onAuthStateChanged(auth, user => {
      if (user) {
        show('sectionFinanceiro');
        preencherSeletores();
        carregarFinanceiro();
      } else {
        location.href = './administrativo.html';
      }
    });

    function preencherSeletores() {
      document.getElementById('selMes').value = mesSelecionado;
      const selAno = document.getElementById('selAno');
      const anoAtual = new Date().getFullYear();
      for (let a = anoAtual; a >= anoAtual - 3; a--) {
        const o = document.createElement('option');
        o.value = a; o.textContent = a; selAno.appendChild(o);
      }
      selAno.value = anoSelecionado;
    }

    // ── Carregar dados ───────────────────────────────────────────────────────
    async function carregarFinanceiro(forcar = false) {
      const mes = parseInt(document.getElementById('selMes').value);
      const ano = parseInt(document.getElementById('selAno').value);
      mesSelecionado = mes; anoSelecionado = ano;

      if (!forcar) {
        const cached = lerCache(mes, ano);
        if (cached) {
          todosRegistros = cached;
          document.getElementById('listInfo').textContent = '';
          renderListaFiltrada(); atualizarResumo(); return;
        }
      }

      document.getElementById('listInfo').textContent = 'Carregando…';
      document.getElementById('listaAlunos').innerHTML = '';
      document.getElementById('resumoGrid').style.display = 'none';

      try {
        const alunosSnap = await getDocs(query(collection(db,'alunos'), where('status','==','ATIVO')));
        const pagSnap    = await getDocs(query(collection(db,'pagamentos'),
          where('mes','==',mes), where('ano','==',ano)));

        const pagByAluno = {};
        pagSnap.forEach(d => { const p = d.data(); pagByAluno[p.alunoId] = p; });

        const agora = new Date();
        const isPast = (ano < agora.getFullYear()) || (ano === agora.getFullYear() && mes < agora.getMonth()+1);

        todosRegistros = alunosSnap.docs.map(d => {
          const a   = d.data();
          const id  = d.id;
          const pag = pagByAluno[id];
          return {
            id,
            nome:                a.nome_aluno || '',
            plano:               a.plano || '',
            email:               a.email || '',
            telefone:            a.telefone || '',
            cpf:                 a.cpf || '',
            grupo_familiar:      a.grupo_familiar || '',
            data_contrato:       a.data_contrato || '',
            asaas_id:            a.asaas_id || '',
            asaas_assinatura_id: a.asaas_assinatura_id || '',
            asaas_cobranca_id:   a.asaas_cobranca_id || '',
            asaas_tipo:          a.asaas_tipo || '',
            asaas_paymentLink:   a.asaas_paymentLink || '',
            valorMensalidade:    valorDePlano(a.plano),
            statusPagamento: pag ? 'pago' : (isPast ? 'vencido' : 'pendente'),
            valor:           pag ? (pag.valor || 0) : 0,
            dataPagamento:   pag ? (pag.data || '') : '',
            formaPagamento:  pag ? (pag.formaPagamento || '') : '',
          };
        });

        salvarCache(mes, ano, todosRegistros);
        document.getElementById('listInfo').textContent = '';
        renderListaFiltrada(); atualizarResumo();
      } catch(e) {
        document.getElementById('listInfo').textContent = 'Erro de conexão. Tente novamente.';
      }
    }

    // ── Resumo ──────────────────────────────────────────────────────────────
    function atualizarResumo() {
      if (!todosRegistros.length) { document.getElementById('resumoGrid').style.display = 'none'; return; }
      let arrecadado = 0, pendente = 0, emDia = 0;
      todosRegistros.forEach(a => {
        const st = getEffectiveStatus(a);
        if (st === 'pago') {
          arrecadado += parseFloat(a.valor || calcularValorFinal(a));
          emDia++;
        } else {
          pendente += calcularValorFinal(a);
        }
      });
      document.getElementById('resumoArrecadado').textContent = 'R$ ' + arrecadado.toFixed(2).replace('.',',');
      document.getElementById('resumoPendente').textContent   = 'R$ ' + pendente.toFixed(2).replace('.',',');
      document.getElementById('resumoEmDia').textContent      = emDia;
      document.getElementById('resumoGrid').style.display     = '';
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function renderListaFiltrada() {
      const busca = (document.getElementById('searchBox').value || '').toLowerCase().trim();
      let lista = todosRegistros;
      if (filtroAtivo !== 'todos') lista = lista.filter(a => getEffectiveStatus(a) === filtroAtivo);
      if (busca) lista = lista.filter(a => (a.nome||'').toLowerCase().includes(busca));
      const container = document.getElementById('listaAlunos');
      if (!lista.length) { container.innerHTML = '<div class="lista-vazia">Nenhum resultado encontrado.</div>'; return; }
      container.innerHTML = lista.map(buildCardHtml).join('');
    }

    function buildCardHtml(a) {
      const st = getEffectiveStatus(a);
      let badgeClass = 'status-pendente', badgeText = '⏳ Pendente';
      if (st === 'pago')    { badgeClass = 'status-pago';    badgeText = '✅ Pago'; }
      if (st === 'vencido') { badgeClass = 'status-vencido'; badgeText = '❌ Vencido'; }

      const temDesconto = detectarDesconto(a);
      const valorFinal  = calcularValorFinal(a);
      const valorDisp   = valorFinal > 0
        ? 'R$\u00a0' + valorFinal.toFixed(2).replace('.',',') + (temDesconto ? ' <span class="desconto-tag">10%\u00a0desc.</span>' : '')
        : '—';

      // Chips extras
      let extras = '';
      if (a.asaas_id) extras += '<span class="asaas-badge" style="margin-top:6px;display:inline-block;">Asaas</span> ';
      if (a.plano === 'Recorrente' && a.data_contrato) {
        const dc = new Date(a.data_contrato + 'T00:00:00');
        const dataC = new Date(dc); dataC.setMonth(dataC.getMonth() + 2);
        if (new Date() < dataC) extras += '<span class="chip-carencia">⏳ Carência até ' + formatDataBR(dataC) + '</span>';
      }

      const vencimento     = String(DIA_VENCIMENTO).padStart(2,'0') + '/' + String(mesSelecionado).padStart(2,'0') + '/' + anoSelecionado;
      const contratoDisp   = a.data_contrato ? formatData(a.data_contrato) : '—';
      const dataPagDisp    = a.dataPagamento ? formatData(a.dataPagamento) : '—';

      // Botões de ação
      const ie = escAttr(a.id);
      let acoes = '';

      if (!a.asaas_id) {
        acoes += '<button class="btn-acao blue" onclick="window._vincular(\'' + ie + '\')">🔗 Vincular ao Asaas</button>';
      } else {
        acoes += '<button class="btn-acao" id="btnSync-' + ie + '" onclick="window._sync(\'' + ie + '\')">🔄 Sincronizar</button>';
        if (a.asaas_paymentLink) {
          acoes += '<a class="btn-acao" href="' + escHtml(a.asaas_paymentLink) + '" target="_blank" rel="noopener">🔗 Ver no Asaas</a>';
        }
        if (a.plano === 'Mensal' && st !== 'pago') {
          acoes += '<button class="btn-acao blue" onclick="window._cobrar(\'' + ie + '\',\'PIX\')">📲 Gerar Pix</button>';
          acoes += '<button class="btn-acao" onclick="window._cobrar(\'' + ie + '\',\'BOLETO\')">📄 Gerar Boleto</button>';
        }
        if (a.plano === 'Recorrente' && a.asaas_assinatura_id) {
          acoes += '<button class="btn-acao red" onclick="window._cancelar(\'' + ie + '\')">❌ Cancelar Assinatura</button>';
        }
      }

      // WhatsApp
      const live = asaasStatusMap[a.id] || {};
      const temLink = a.asaas_paymentLink || live.invoiceUrl || live.pixCopiaECola;
      const tel = validarTelefone(a.telefone);
      if (temLink && tel) {
        acoes += '<button class="btn-acao green" onclick="window._wpp(\'' + ie + '\')">💬 WhatsApp</button>';
      }

      // Registro manual (Mensal sempre)
      if (a.plano === 'Mensal') {
        acoes += '<button class="btn-acao orange" onclick="window._manual(\'' + ie + '\',\'' + escAttr(a.nome||'') + '\',\'' + escAttr(String(valorFinal||'')) + '\')">💵 Registrar Manual</button>';
      }

      return '<div class="fin-aluno-card">' +
        '<div class="fin-aluno-header">' +
          '<div class="fin-aluno-nome">' + escHtml(a.nome||'—') + '</div>' +
          '<span class="status-badge ' + badgeClass + '">' + badgeText + '</span>' +
        '</div>' +
        (extras ? '<div style="margin-top:6px;">' + extras + '</div>' : '') +
        '<div class="fin-aluno-info">' +
          '<div class="fin-info-item"><span class="fin-info-label">Plano</span><span class="fin-info-valor">' + escHtml(a.plano||'—') + '</span></div>' +
          '<div class="fin-info-item"><span class="fin-info-label">Valor</span><span class="fin-info-valor">' + valorDisp + '</span></div>' +
          '<div class="fin-info-item"><span class="fin-info-label">Contrato</span><span class="fin-info-valor">' + contratoDisp + '</span></div>' +
          '<div class="fin-info-item"><span class="fin-info-label">Vencimento</span><span class="fin-info-valor">' + (st==='pago'?dataPagDisp:vencimento) + '</span></div>' +
          (st==='pago' ? '<div class="fin-info-item"><span class="fin-info-label">Forma</span><span class="fin-info-valor">' + formatFormaPag(a.formaPagamento) + '</span></div>' : '') +
        '</div>' +
        '<div class="btns-acao">' + acoes + '</div>' +
      '</div>';
    }

    // ── Exposições window ────────────────────────────────────────────────────

    window._manual = function(alunoId, nome, valorSug) {
      document.getElementById('modalAlunoId').value         = alunoId;
      document.getElementById('modalAlunoNome').textContent  = nome;
      document.getElementById('fValor').value               = valorSug || '';
      document.getElementById('fData').value                = new Date().toISOString().slice(0,10);
      document.getElementById('fFormaPag').value            = 'dinheiro';
      document.getElementById('modalErr').textContent       = '';
      document.getElementById('modalInfo').textContent      = '';
      document.getElementById('btnConfirmarPag').disabled   = false;
      document.getElementById('modalPagamento').classList.add('open');
    };
    // Alias legado para compatibilidade com onclick existente
    window._abrirModal = window._manual;

    window._sync = async function(alunoId) {
      const a = todosRegistros.find(r => r.id === alunoId);
      if (!a || !a.asaas_id) return;
      const btn = document.getElementById('btnSync-' + alunoId);
      if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
      try {
        let tipo = 'customer', asaasId = a.asaas_id;
        if (a.asaas_tipo === 'assinatura' && a.asaas_assinatura_id) {
          tipo = 'assinatura'; asaasId = a.asaas_assinatura_id;
        } else if ((a.asaas_tipo === 'parcelamento' || a.asaas_tipo === 'avista') && a.asaas_cobranca_id) {
          tipo = 'cobranca'; asaasId = a.asaas_cobranca_id;
        }
        const resp = await gasCall('asaasStatus', { asaasId, tipo, mes: mesSelecionado, ano: anoSelecionado });
        if (resp.ok) {
          asaasStatusMap[alunoId] = resp;
          const idx = todosRegistros.findIndex(r => r.id === alunoId);
          if (idx >= 0) {
            const st = resp.status || '';
            if (st === 'CONFIRMED' || st === 'RECEIVED') {
              todosRegistros[idx].statusPagamento = 'pago';
              todosRegistros[idx].valor = resp.valor || todosRegistros[idx].valor;
              todosRegistros[idx].dataPagamento   = resp.dataPagamento || '';
            } else if (st === 'OVERDUE') {
              todosRegistros[idx].statusPagamento = 'vencido';
            } else {
              todosRegistros[idx].statusPagamento = 'pendente';
            }
          }
          renderListaFiltrada(); atualizarResumo();
        } else {
          alert('Erro ao sincronizar: ' + (resp.erro || 'desconhecido'));
          if (btn) { btn.disabled = false; btn.textContent = '🔄 Sincronizar'; }
        }
      } catch(e) {
        alert('Erro ao sincronizar: ' + e.message);
        if (btn) { btn.disabled = false; btn.textContent = '🔄 Sincronizar'; }
      }
    };

    window._cancelar = async function(alunoId) {
      const a = todosRegistros.find(r => r.id === alunoId);
      if (!a || !a.asaas_assinatura_id) { alert('Assinatura não encontrada.'); return; }
      if (a.data_contrato) {
        const dc = new Date(a.data_contrato + 'T00:00:00');
        const dataC = new Date(dc); dataC.setMonth(dataC.getMonth() + 2);
        if (new Date() < dataC && !confirm('⚠️ Este aluno está em carência até ' + formatDataBR(dataC) + '.\nDeseja cancelar mesmo assim?')) return;
      }
      if (!confirm('Cancelar a assinatura de ' + a.nome + '?\nEsta ação não pode ser desfeita.')) return;
      try {
        const resp = await gasCall('asaasCancelarAssinatura', { assinatura_id: a.asaas_assinatura_id });
        if (resp.ok) {
          await updateDoc(doc(db,'alunos',alunoId), { asaas_assinatura_id: '', asaas_tipo: 'cancelado' });
          const idx = todosRegistros.findIndex(r => r.id === alunoId);
          if (idx >= 0) { todosRegistros[idx].asaas_assinatura_id = ''; todosRegistros[idx].asaas_tipo = 'cancelado'; }
          invalidarCache(mesSelecionado, anoSelecionado);
          renderListaFiltrada();
          alert('✅ Assinatura cancelada com sucesso.');
        } else { alert('Erro: ' + (resp.erro || 'desconhecido')); }
      } catch(e) { alert('Erro: ' + e.message); }
    };

    window._wpp = function(alunoId) {
      const a = todosRegistros.find(r => r.id === alunoId);
      if (!a) return;
      const tel = validarTelefone(a.telefone);
      if (!tel) { alert('Telefone inválido. Deve conter DDD + número (10-11 dígitos).'); return; }
      const url = buildWhatsAppUrl(a);
      if (url) window.open(url, '_blank');
    };

    window._cobrar = async function(alunoId, formaPag) {
      const a = todosRegistros.find(r => r.id === alunoId);
      if (!a) return;
      const temDesc = detectarDesconto(a);
      const dataC   = a.data_contrato || new Date().toISOString().slice(0,10);
      try {
        const resp = await gasCall('asaasVincular', {
          nome: a.nome, email: a.email, telefone: a.telefone, cpf: a.cpf,
          plano: 'Mensal', formaPag,
          grupoFamiliar: a.grupo_familiar,
          temDesconto: temDesc ? 'true' : 'false',
          dataContrato: dataC
        });
        if (!resp.ok) { alert('Erro: ' + (resp.erro||'desconhecido')); return; }
        const upd = {
          asaas_id:          resp.customerId || a.asaas_id,
          asaas_cobranca_id: resp.cobranca_id || '',
          asaas_tipo:        resp.tipo || 'avista',
          asaas_paymentLink: resp.paymentLink || ''
        };
        await updateDoc(doc(db,'alunos',alunoId), upd);
        const idx = todosRegistros.findIndex(r => r.id === alunoId);
        if (idx >= 0) Object.assign(todosRegistros[idx], upd);
        invalidarCache(mesSelecionado, anoSelecionado);
        if (formaPag === 'PIX' && (resp.pixQrCodeImage || resp.pixCopiaECola)) {
          _mostrarPixModal(a.nome, resp.pixQrCodeImage, resp.pixCopiaECola, resp.paymentLink, todosRegistros.find(r=>r.id===alunoId)||a);
        } else {
          renderListaFiltrada();
          alert('✅ Cobrança gerada!' + (resp.paymentLink ? '\nLink: ' + resp.paymentLink : ''));
        }
      } catch(e) { alert('Erro: ' + e.message); }
    };

    window._vincular = function(alunoId) {
      const a = todosRegistros.find(r => r.id === alunoId);
      if (!a) return;
      document.getElementById('vincularAlunoId').value       = alunoId;
      document.getElementById('vincularNome').textContent     = a.nome || '';
      document.getElementById('vincularErr').textContent      = '';
      document.getElementById('vincularInfo').textContent     = '';
      document.getElementById('vincularPlano').value          = a.plano || 'Recorrente';
      document.getElementById('vincularDataContrato').value   = a.data_contrato || new Date().toISOString().slice(0,10);
      document.getElementById('vincularDesconto').checked     = detectarDesconto(a);
      document.getElementById('btnCriarAsaas').disabled       = false;
      atualizarFormVincular();
      document.getElementById('vincularFormWrap').style.display    = '';
      document.getElementById('vincularSuccessWrap').style.display = 'none';
      document.getElementById('modalVincular').classList.add('open');
    };

    function _mostrarPixModal(nome, qrImage, pixKey, paymentLink, alunoData) {
      document.getElementById('vincularAlunoId').value         = alunoData ? alunoData.id : '';
      document.getElementById('vincularNome').textContent       = nome || '';
      document.getElementById('vincularFormWrap').style.display    = 'none';
      document.getElementById('vincularSuccessWrap').style.display = '';
      const qrWrap = document.getElementById('vincularQrWrap');
      if (qrImage || pixKey) {
        qrWrap.style.display = '';
        const qrImg = document.getElementById('vincularQrImg');
        qrImg.src = qrImage ? 'data:image/png;base64,' + qrImage : '';
        qrImg.style.display = qrImage ? '' : 'none';
        document.getElementById('vincularPixKey').textContent = pixKey || '';
        document.getElementById('btnCopiarPix').onclick = function() {
          navigator.clipboard.writeText(pixKey||'').then(() => {
            this.textContent = '✅ Copiado!';
            setTimeout(() => { this.textContent = '📋 Copiar código Pix'; }, 2000);
          }).catch(() => { alert('Erro ao copiar. Código Pix: ' + pixKey); });
        };
      } else { qrWrap.style.display = 'none'; }
      const btnWa = document.getElementById('btnVincularWhatsapp');
      if (alunoData) {
        const tel = validarTelefone(alunoData.telefone);
        if (pixKey) { asaasStatusMap[alunoData.id] = Object.assign(asaasStatusMap[alunoData.id]||{}, { pixCopiaECola: pixKey }); }
        if (tel) {
          btnWa.style.display = '';
          btnWa.onclick = function() { const u = buildWhatsAppUrl(alunoData); if (u) window.open(u,'_blank'); };
        } else { btnWa.style.display = 'none'; }
      }
      document.getElementById('modalVincular').classList.add('open');
      renderListaFiltrada();
    }

    // ── Modal vincular: controles ────────────────────────────────────────────
    function atualizarFormVincular() {
      const plano = document.getElementById('vincularPlano').value;
      document.getElementById('vincularFormaPagWrap').style.display = plano === 'Mensal' ? '' : 'none';
      const temD   = document.getElementById('vincularDesconto').checked;
      const base   = { Recorrente:200, Semestral:220, Mensal:240 }[plano] || 0;
      const final  = temD ? Math.round(base * 0.9 * 100) / 100 : base;
      document.getElementById('vincularValorFinal').textContent = 'R$ ' + final.toFixed(2).replace('.',',');
    }

    document.getElementById('vincularPlano').addEventListener('change', atualizarFormVincular);
    document.getElementById('vincularDesconto').addEventListener('change', atualizarFormVincular);

      const alunoId      = document.getElementById('vincularAlunoId').value;
      const a            = todosRegistros.find(r => r.id === alunoId);
      const plano        = document.getElementById('vincularPlano').value;

      try {
        const resp = await gasCall('asaasVincular', {
          alunoId,
          nome:          a ? a.nome : '',
          email:         a ? a.email : '',
          telefone:      a ? a.telefone : '',
          cpf:           a ? a.cpf : '',
          plano,
          formaPag:      plano === 'Mensal' ? formaPag : '',
          grupoFamiliar: a ? a.grupo_familiar : '',
          temDesconto:   temDesconto ? 'true' : 'false',
          dataContrato
        });
        if (!resp.ok) {
          document.getElementById('vincularErr').textContent  = 'Erro: ' + (resp.erro||'desconhecido');
          document.getElementById('vincularInfo').textContent = '';
          document.getElementById('btnCriarAsaas').disabled   = false;
          return;
        }
        // Salvar no Firestore
        const upd = {
          asaas_id:            resp.customerId || '',
          asaas_assinatura_id: resp.assinatura_id || '',
          asaas_cobranca_id:   resp.cobranca_id || '',
          asaas_tipo:          resp.tipo || '',
          asaas_paymentLink:   resp.paymentLink || '',
          data_contrato:       dataContrato,
          plano
        };
        await updateDoc(doc(db,'alunos',alunoId), upd);
        const idx = todosRegistros.findIndex(r => r.id === alunoId);
        if (idx >= 0) Object.assign(todosRegistros[idx], upd);
        invalidarCache(mesSelecionado, anoSelecionado);

        // Exibir sucesso
        document.getElementById('vincularFormWrap').style.display    = 'none';
        document.getElementById('vincularSuccessWrap').style.display = '';
        const qrWrap = document.getElementById('vincularQrWrap');
        if (resp.pixQrCodeImage || resp.pixCopiaECola) {
          qrWrap.style.display = '';
          const qrImg = document.getElementById('vincularQrImg');
          qrImg.src = resp.pixQrCodeImage ? 'data:image/png;base64,' + resp.pixQrCodeImage : '';
          qrImg.style.display = resp.pixQrCodeImage ? '' : 'none';
          document.getElementById('vincularPixKey').textContent = resp.pixCopiaECola || '';
          document.getElementById('btnCopiarPix').onclick = function() {
            navigator.clipboard.writeText(resp.pixCopiaECola||'').then(() => {
              this.textContent = '✅ Copiado!';
              setTimeout(() => { this.textContent = '📋 Copiar código Pix'; }, 2000);
            }).catch(() => { alert('Erro ao copiar. Código Pix: ' + resp.pixCopiaECola); });
          };
          if (resp.pixCopiaECola) {
            asaasStatusMap[alunoId] = Object.assign(asaasStatusMap[alunoId]||{}, { pixCopiaECola: resp.pixCopiaECola, invoiceUrl: resp.paymentLink||'' });
          }
        } else { qrWrap.style.display = 'none'; }

        const btnWa = document.getElementById('btnVincularWhatsapp');
        const aAtual = todosRegistros.find(r => r.id === alunoId);
        if (aAtual) {
          const tel = validarTelefone(aAtual.telefone);
          if (tel) {
            btnWa.style.display = '';
            btnWa.onclick = function() { const u = buildWhatsAppUrl(aAtual); if (u) window.open(u,'_blank'); };
          } else { btnWa.style.display = 'none'; }
        }
      } catch(e) {
        document.getElementById('vincularErr').textContent  = 'Erro: ' + e.message;
        document.getElementById('vincularInfo').textContent = '';
        document.getElementById('btnCriarAsaas').disabled   = false;
      }
    });

    function fecharModalVincular() { document.getElementById('modalVincular').classList.remove('open'); }
    document.getElementById('btnCancelarVincular').addEventListener('click', fecharModalVincular);
    document.getElementById('btnFecharVincular').addEventListener('click', () => { fecharModalVincular(); renderListaFiltrada(); atualizarResumo(); });
    document.getElementById('modalVincular').addEventListener('click', function(e) { if (e.target === this) fecharModalVincular(); });

    // ── Modal pagamento manual ───────────────────────────────────────────────
    function fecharModal() { document.getElementById('modalPagamento').classList.remove('open'); }
    document.getElementById('btnCancelarModal').addEventListener('click', fecharModal);
    document.getElementById('modalPagamento').addEventListener('click', function(e) { if (e.target === this) fecharModal(); });

    document.getElementById('btnConfirmarPag').addEventListener('click', async () => {
      const alunoId  = document.getElementById('modalAlunoId').value;
      const valor    = parseFloat(document.getElementById('fValor').value);
      const data     = document.getElementById('fData').value;
      const formaPag = document.getElementById('fFormaPag').value;
      document.getElementById('modalErr').textContent = '';
      if (!alunoId)              { document.getElementById('modalErr').textContent = 'Aluno não identificado.'; return; }
      if (!valor||isNaN(valor)||valor<=0) { document.getElementById('modalErr').textContent = 'Informe um valor válido.'; return; }
      if (!data)                 { document.getElementById('modalErr').textContent = 'Informe a data.'; return; }
      document.getElementById('modalInfo').textContent    = 'Registrando…';
      document.getElementById('btnConfirmarPag').disabled = true;
      try {
        const aluno = todosRegistros.find(a => String(a.id) === String(alunoId));
        await addDoc(collection(db,'pagamentos'), {
          alunoId, nome: aluno ? aluno.nome : '',
          valor, data, formaPagamento: formaPag,
          mes: mesSelecionado, ano: anoSelecionado,
          criadoEm: serverTimestamp()
        });
        document.getElementById('modalInfo').textContent = '';
        fecharModal();
        invalidarCache(mesSelecionado, anoSelecionado);
        await carregarFinanceiro(true);
      } catch(e) {
        document.getElementById('modalErr').textContent      = 'Erro ao registrar pagamento.';
        document.getElementById('modalInfo').textContent     = '';
        document.getElementById('btnConfirmarPag').disabled  = false;
      }
    });

    // ── Filtros / busca / botões ─────────────────────────────────────────────
    document.querySelectorAll('.btn-filtro').forEach(btn => btn.addEventListener('click', () => {
      document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('ativo'));
      btn.classList.add('ativo'); filtroAtivo = btn.dataset.filtro; renderListaFiltrada();
    }));
    document.getElementById('searchBox').addEventListener('input', renderListaFiltrada);
    document.getElementById('btnCarregar').addEventListener('click', () => {
      invalidarCache(parseInt(document.getElementById('selMes').value), parseInt(document.getElementById('selAno').value));
      carregarFinanceiro(true);
    });
    document.getElementById('btnHdrSair').addEventListener('click', () => {
      signOut(auth).catch(()=>{});
      sessionStorage.removeItem(TOKEN_KEY);
      location.href = './administrativo.html';
    });

    // ── WhatsApp builder ─────────────────────────────────────────────────────
    function buildWhatsAppUrl(a) {
      const tel = validarTelefone(a.telefone);
      if (!tel) return null;
      const nome  = a.nome || '';
      const valor = calcularValorFinal(a).toFixed(2).replace('.',',');
      const plano = a.plano || '';
      const live  = asaasStatusMap[a.id] || {};
      const paymentLink = live.invoiceUrl || a.asaas_paymentLink || '';
      const pixKey      = live.pixCopiaECola || '';
      const dataVenc    = a.data_contrato
        ? formatData(a.data_contrato)
        : String(DIA_VENCIMENTO).padStart(2,'0') + '/' + String(mesSelecionado).padStart(2,'0') + '/' + anoSelecionado;
      let msg = '';
      if (plano === 'Recorrente') {
        msg = 'Olá ' + nome + '! 😊\nSua assinatura mensal Riva BJJ está ativa.\nValor: R$ ' + valor + '/mês (débito automático no cartão)\nEm caso de dúvidas, estamos à disposição! 🥋';
      } else if (plano === 'Semestral') {
        msg = 'Olá ' + nome + '! 😊\nSeu plano semestral Riva BJJ foi gerado.\n6x de R$ ' + valor + ' no cartão de crédito.\nLink para pagamento: ' + paymentLink + '\nEm caso de dúvidas, estamos à disposição! 🥋';
      } else if (plano === 'Mensal') {
        if (pixKey) {
          msg = 'Olá ' + nome + '! 😊\nSua mensalidade Riva BJJ de R$ ' + valor + ' foi gerada.\nPague via Pix: ' + pixKey + '\nVencimento: ' + dataVenc + '\nEm caso de dúvidas, estamos à disposição! 🥋';
        } else {
          msg = 'Olá ' + nome + '! 😊\nSua mensalidade Riva BJJ de R$ ' + valor + ' foi gerada.\nBoleto: ' + paymentLink + '\nVencimento: ' + dataVenc + '\nEm caso de dúvidas, estamos à disposição! 🥋';
        }
      } else {
        msg = 'Olá ' + nome + '! 😊\nEm caso de dúvidas sobre seu plano Riva BJJ, estamos à disposição! 🥋';
      }
      return 'https://wa.me/55' + tel + '?text=' + encodeURIComponent(msg);
    }
  </script>
</body>
</html>
