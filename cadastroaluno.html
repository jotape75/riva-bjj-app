<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c0392b" />
  <title>Cadastrar Aluno – Riva BJJ</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .admin-hdr-left { display: flex; align-items: center; gap: 14px; }
    .admin-hdr-titulo { display: none; }
    .admin-hdr-sair { display: none; }
    .btn-logout { background: transparent; border: 1px solid var(--border); color: #fff; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .btn-logout:active { opacity: .75; }
    @media (min-width: 769px) {
      .admin-hdr-inner { max-width: 1100px; justify-content: space-between; padding: 0 24px; }
      .admin-logo { width: 48px !important; height: 48px !important; margin-top: 0 !important; }
      .admin-hdr-titulo { display: inline; font-size: 20px; font-weight: 900; color: #fff; letter-spacing: 0.5px; }
      .admin-hdr-sair { display: inline-block; }
      .admin-page { max-width: 1100px; padding: 32px 32px 64px; }
    }
    @media (max-width: 768px) { .admin-hdr-inner { justify-content: center; } }
    .cep-wrap { position: relative; margin-bottom: 4px; }
    .cep-wrap .input { margin-bottom: 0; padding-right: 44px; }
    .cep-spinner { display: none; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; color: #aaa; pointer-events: none; }
    .addr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 0; }
    .addr-grid .input { margin-bottom: 0; background: #1a1a1a; color: #bbb; }
    .addr-readonly { background: #1a1a1a !important; color: #bbb !important; }
  </style>
</head>
<body>
  <header class="hdr admin-hdr">
    <div class="hdr-inner admin-hdr-inner">
      <div class="admin-hdr-left">
        <img class="logo admin-logo" src="./logo.png" alt="Riva BJJ" />
        <span class="admin-hdr-titulo">Portal Administrativo</span>
      </div>
      <button class="btn-logout admin-hdr-sair" id="btnHdrSair">Sair</button>
    </div>
  </header>

  <main class="page admin-page">
    <section class="card" id="cardForm">
      <h1 class="title">Cadastrar Aluno</h1>

      <label class="label" for="fNome">Nome *</label>
      <input id="fNome" class="input" type="text" placeholder="Nome completo" required />

      <label class="label" for="fEmail">Email *</label>
      <input id="fEmail" class="input" type="email" inputmode="email" placeholder="email@exemplo.com" required />

      <label class="label" for="fFaixa">Faixa</label>
      <select id="fFaixa" class="input">
        <optgroup label="── Adulto ──">
          <option value="Branca">Branca</option>
          <option value="Azul">Azul</option>
          <option value="Roxa">Roxa</option>
          <option value="Marrom">Marrom</option>
          <option value="Preta">Preta</option>
        </optgroup>
        <optgroup label="── Kids / Infantil / Juvenil ──">
          <option value="Cinza e Branca">Cinza e Branca</option>
          <option value="Cinza">Cinza</option>
          <option value="Cinza e Preta">Cinza e Preta</option>
          <option value="Amarela e Branca">Amarela e Branca</option>
          <option value="Amarela">Amarela</option>
          <option value="Amarela e Preta">Amarela e Preta</option>
          <option value="Laranja e Branca">Laranja e Branca</option>
          <option value="Laranja">Laranja</option>
          <option value="Laranja e Preta">Laranja e Preta</option>
          <option value="Verde e Branca">Verde e Branca</option>
          <option value="Verde">Verde</option>
          <option value="Verde e Preta">Verde e Preta</option>
        </optgroup>
      </select>

      <label class="label" for="fGrau">Grau Atual</label>
      <select id="fGrau" class="input">
        <option value="0">0</option><option value="1">1</option>
        <option value="2">2</option><option value="3">3</option><option value="4">4</option>
      </select>

      <label class="label" for="fAulasNoGrau">Aulas no Grau (opcional)</label>
      <input id="fAulasNoGrau" class="input" type="number" min="0" placeholder="0" value="0" />

      <label class="label" for="fData">Data do Último Grau (opcional)</label>
      <input id="fData" class="input" type="date" />

      <label class="label" for="fCategoria">Categoria</label>
      <select id="fCategoria" class="input">
        <option value="Adulto">Adulto</option>
        <option value="Kids">Kids</option>
        <option value="Infantil">Infantil</option>
        <option value="Juvenil">Juvenil</option>
      </select>
      <!-- ── Responsável (Kids / Infantil / Juvenil) ── -->
      <div id="secaoResponsavel" style="display:none; border: 1px solid #f39c12; border-radius: 12px; padding: 14px; margin-bottom: 12px; background: rgba(243,156,18,.05);">
        <div style="font-size:15px;font-weight:900;color:#f39c12;margin-bottom:12px;">👨‍👧 Responsável</div>
      
        <label class="label" for="fRespNome">Nome do Responsável *</label>
        <input id="fRespNome" class="input" type="text" placeholder="Nome completo do responsável" />
      
        <label class="label" for="fRespCpf">CPF do Responsável *</label>
        <input id="fRespCpf" class="input" type="tel" inputmode="numeric" maxlength="14" placeholder="000.000.000-00" autocomplete="off" />
      
        <label class="label" for="fRespEmail">Email do Responsável *</label>
        <input id="fRespEmail" class="input" type="email" inputmode="email" placeholder="email@exemplo.com" />
      
        <label class="label" for="fRespTelefone">Telefone do Responsável *</label>
        <input id="fRespTelefone" class="input" type="tel" placeholder="(00) 00000-0000" />
      </div>
      <label class="label" for="fCpf">CPF</label>
      <input id="fCpf" class="input" type="tel" inputmode="numeric" maxlength="14" placeholder="000.000.000-00" autocomplete="off" />

      <label class="label" for="fDataNasc">Data de Nascimento</label>
      <input id="fDataNasc" class="input" type="date" />

      <label class="label" for="fDataInicio">Data de Início</label>
      <input id="fDataInicio" class="input" type="date" />

      <label class="label" for="fTelefone">Telefone</label>
      <input id="fTelefone" class="input" type="tel" placeholder="(00) 00000-0000" />

      <!-- ── CEP + Endereço ── -->
      <label class="label" for="fCep">CEP</label>
      <div class="cep-wrap">
        <input id="fCep" class="input" type="tel" inputmode="numeric" maxlength="9" placeholder="00000-000" autocomplete="off" />
        <span class="cep-spinner" id="cepSpinner">⏳</span>
      </div>
      <p class="msg err" id="cepErr" style="margin-bottom:6px;"></p>

      <label class="label" for="fRua">Rua</label>
      <input id="fRua" class="input addr-readonly" type="text" placeholder="Preenchido pelo CEP" readonly />

      <div class="addr-grid">
        <div>
          <label class="label" for="fBairro">Bairro</label>
          <input id="fBairro" class="input addr-readonly" type="text" placeholder="—" readonly />
        </div>
        <div>
          <label class="label" for="fCidade">Cidade</label>
          <input id="fCidade" class="input addr-readonly" type="text" placeholder="—" readonly />
        </div>
      </div>
      <div style="height:10px;"></div>

      <label class="label" for="fEstado">Estado</label>
      <input id="fEstado" class="input addr-readonly" type="text" maxlength="2" placeholder="UF" readonly style="max-width:80px;" />

      <label class="label" for="fNumero">Número</label>
      <input id="fNumero" class="input" type="text" placeholder="Ex: 277" />

      <!-- ── Financeiro ── -->
      <div style="border-top: 1px solid var(--border); margin: 16px 0 8px; padding-top: 12px;">
        <div style="font-size:15px;font-weight:900;color:#fff;margin-bottom:12px;">💰 Financeiro</div>

        <label class="label" for="fPlano">Plano</label>
        <select id="fPlano" class="input">
          <option value="">Não definido</option>
          <option value="Recorrente">Recorrente – R$ 200,00</option>
          <option value="Semestral">Semestral – R$ 220,00</option>
          <option value="Mensal">Mensal – R$ 240,00</option>
        </select>

        <label class="label" for="fGrupoFamiliar">Grupo Familiar (opcional)</label>
        <input id="fGrupoFamiliar" class="input" type="text" placeholder="Ex: Família Silva" />

        <label class="label" for="fDataContrato">Data de Início do Contrato</label>
        <input id="fDataContrato" class="input" type="date" />
      </div>

      <button class="btn primary" id="btnCadastrar">Cadastrar Aluno</button>
      <p class="msg err" id="formErr"></p>
      <p class="msg info" id="formInfo"></p>

      <button class="btn secondary" onclick="location.href='./alunos.html'">Ver Lista de Alunos</button>
      <button class="btn secondary" onclick="location.href='./administrativo.html'">← Voltar ao Portal</button>
    </section>
  </main>

  <script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const TOKEN_KEY = 'rv_prof_token';

    function setErr(id, msg)  { document.getElementById(id).textContent = msg; }
    function setInfo(id, msg) { document.getElementById(id).textContent = msg; }

    onAuthStateChanged(auth, (user) => {
      if (!user) location.href = './administrativo.html';
    });

    // ── Helpers ────────────────────────────────────────────────
    const EMOJI_FAIXA_CAD = {
      'Branca':'🔲','Azul':'🟦','Roxa':'🟪','Marrom':'🟫','Preta':'⬛',
    };
    function gerarStatusCad(faixa, grau) {
      const emoji = EMOJI_FAIXA_CAD[faixa] || '🔲';
      const g = Math.min(Math.max(Number(grau) || 0, 0), 4);
      if (g === 0) return 'Iniciante';
      return emoji.repeat(g);
    }
    function toDateBR(isoDate) {
      if (!isoDate) return '';
      const [y, m, d] = isoDate.split('-');
      return `${d}/${m}/${y}`;
    }
    function formatarCep(val) {
      return val.replace(/\D/g,'').slice(0,8).replace(/(\d{5})(\d)/,'$1-$2');
    }

    // ── Máscara CPF ────────────────────────────────────────────
    function formatarCpf(val) {
      return val.replace(/\D/g,'').slice(0,11)
        .replace(/(\d{3})(\d)/,'$1.$2')
        .replace(/(\d{3})(\d)/,'$1.$2')
        .replace(/(\d{3})(\d{1,2})$/,'$1-$2');
    }
    document.getElementById('fCpf').addEventListener('input', function() {
      this.value = formatarCpf(this.value);
    });

    // ── ViaCEP ─────────────────────────────────────────────────
    const cepInput   = document.getElementById('fCep');
    const cepSpinner = document.getElementById('cepSpinner');
    const cepErr     = document.getElementById('cepErr');

    cepInput.addEventListener('input', function () {
      this.value = formatarCep(this.value);
      cepErr.textContent = '';
      const cepLimpo = this.value.replace(/\D/g, '');
      if (cepLimpo.length !== 8) {
        ['fRua','fBairro','fCidade','fEstado'].forEach(id => { document.getElementById(id).value = ''; });
        return;
      }
      buscarCep(cepLimpo);
    });

    async function buscarCep(cep) {
      cepSpinner.style.display = '';
      cepErr.textContent = '';
      try {
        const resp = await fetch('https://viacep.com.br/ws/' + cep + '/json/');
        const data = await resp.json();
        cepSpinner.style.display = 'none';
        if (data.erro) {
          cepErr.textContent = 'CEP não encontrado.';
          ['fRua','fBairro','fCidade','fEstado'].forEach(id => { document.getElementById(id).value = ''; });
          return;
        }
        document.getElementById('fRua').value    = data.logradouro || '';
        document.getElementById('fBairro').value = data.bairro     || '';
        document.getElementById('fCidade').value = data.localidade || '';
        document.getElementById('fEstado').value = data.uf         || '';
      } catch (e) {
        cepSpinner.style.display = 'none';
        cepErr.textContent = 'Erro ao buscar CEP. Verifique sua conexão.';
      }
    }

    // ── Cadastrar aluno ────────────────────────────────────────
    document.getElementById('btnCadastrar').addEventListener('click', async () => {
      const nome  = document.getElementById('fNome').value.trim();
      const email = document.getElementById('fEmail').value.trim().toLowerCase();
      const faixa = document.getElementById('fFaixa').value;
      const grau  = document.getElementById('fGrau').value;
      const data  = document.getElementById('fData').value;

      if (!nome)  { setErr('formErr', 'Nome é obrigatório.'); return; }
      if (!email || email.indexOf('@') < 1) { setErr('formErr', 'Email inválido.'); return; }
      const categoria = document.getElementById('fCategoria').value;
      const categoriasMenor = ['Kids', 'Infantil', 'Juvenil'];
      if (categoriasMenor.includes(categoria)) {
        const respNome  = document.getElementById('fRespNome').value.trim();
        const respCpf   = document.getElementById('fRespCpf').value.replace(/\D/g,'');
        const respEmail = document.getElementById('fRespEmail').value.trim();
        const respTel   = document.getElementById('fRespTelefone').value.trim();
        if (!respNome)             { setErr('formErr', 'Nome do responsável é obrigatório.'); return; }
        if (respCpf.length !== 11) { setErr('formErr', 'CPF do responsável inválido.'); return; }
        if (!respEmail || respEmail.indexOf('@') < 1) { setErr('formErr', 'Email do responsável inválido.'); return; }
        if (!respTel)              { setErr('formErr', 'Telefone do responsável é obrigatório.'); return; }
      }
      setErr('formErr', '');
      setInfo('formInfo', 'Cadastrando…');
      document.getElementById('btnCadastrar').disabled = true;

      try {
        const categoria = document.getElementById('fCategoria').value;
        const metaGrau = (categoria === 'Juvenil' || categoria === 'Kids' || categoria === 'Infantil')? 30: (faixa === 'Branca' ? 36 : 56);
        const aulasNoGrau = parseInt(document.getElementById('fAulasNoGrau').value) || 0;
        await addDoc(collection(db, 'alunos'), {
          nome_aluno:       nome,
          email:            email,
          status:           'ATIVO',
          faixa:            faixa,
          grau_atual:       parseInt(grau) || 0,
          aulas_no_grau:    aulasNoGrau,
          aulas_restantes:  Math.max(0, metaGrau - aulasNoGrau),
          meta_grau:        metaGrau,
          data_ultimo_grau: toDateBR(data) || '',
          statusExame:      gerarStatusCad(faixa, parseInt(grau) || 0),
          telefone:         document.getElementById('fTelefone').value.trim(),
          cpf:              document.getElementById('fCpf').value.trim(),
          data_nasc:        document.getElementById('fDataNasc').value,
          data_inicio:      document.getElementById('fDataInicio').value,
          categoria:        document.getElementById('fCategoria').value,
          plano:            document.getElementById('fPlano').value,
          grupo_familiar:   document.getElementById('fGrupoFamiliar').value.trim(),
          data_contrato:    document.getElementById('fDataContrato').value,
          cep:              document.getElementById('fCep').value.replace(/\D/g,''),
          numero:           document.getElementById('fNumero').value.trim(),
          rua:              document.getElementById('fRua').value.trim(),
          bairro:           document.getElementById('fBairro').value.trim(),
          cidade:           document.getElementById('fCidade').value.trim(),
          estado:           document.getElementById('fEstado').value.trim(),
          asaas_id:             '',
          asaas_assinatura_id:  '',
          asaas_cobranca_id:    '',
          asaas_tipo:           '',
          asaas_paymentLink:    '',
          criadoEm:         serverTimestamp(),
          resp_nome:     document.getElementById('fRespNome').value.trim(),
          resp_cpf:      document.getElementById('fRespCpf').value.trim(),
          resp_email:    document.getElementById('fRespEmail').value.trim().toLowerCase(),
          resp_telefone: document.getElementById('fRespTelefone').value.trim(),
        });

        setInfo('formInfo', '✅ Aluno cadastrado com sucesso!');
        ['fNome','fEmail','fGrupoFamiliar','fCep','fRua','fBairro','fCidade','fEstado','fNumero'].forEach(id => {
          document.getElementById(id).value = '';
        });
        document.getElementById('fCpf').value          = '';
        document.getElementById('fTelefone').value     = '';
        document.getElementById('fFaixa').value        = 'Branca';
        document.getElementById('fGrau').value         = '0';
        document.getElementById('fAulasNoGrau').value  = '0';
        document.getElementById('fData').value         = '';
        document.getElementById('fCategoria').value    = 'Adulto';
        document.getElementById('fDataNasc').value     = '';
        document.getElementById('fDataInicio').value   = '';
        document.getElementById('fPlano').value        = '';
        document.getElementById('fDataContrato').value = '';
        document.getElementById('fRespNome').value     = '';
        document.getElementById('fRespCpf').value      = '';
        document.getElementById('fRespEmail').value    = '';
        document.getElementById('fRespTelefone').value = '';
        document.getElementById('secaoResponsavel').style.display = 'none';
        cepErr.textContent = '';
        localStorage.removeItem('rv_alunos_cache');
        
      } catch (e) {
        setErr('formErr', 'Erro ao cadastrar: ' + (e.message || 'tente novamente.'));
        setInfo('formInfo', '');
      } finally {
        document.getElementById('btnCadastrar').disabled = false;
      }
    });

    document.getElementById('btnHdrSair').addEventListener('click', () => {
      signOut(auth).catch(() => {});
      sessionStorage.removeItem(TOKEN_KEY);
      location.href = './administrativo.html';
    });
    document.getElementById('fCategoria').addEventListener('change', function() {
      const categoriasMenor = ['Kids', 'Infantil', 'Juvenil'];
      const ehMenor = categoriasMenor.includes(this.value);
      document.getElementById('secaoResponsavel').style.display = ehMenor ? '' : 'none';
    });
    document.getElementById('fRespCpf').addEventListener('input', function() {
      this.value = formatarCpf(this.value);
    });
    
    
  </script>
</body>
</html>
