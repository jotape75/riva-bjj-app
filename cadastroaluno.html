<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c0392b" />
  <title>Cadastrar Aluno – Riva BJJ</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    /* ── Header desktop compacto ── */
    .admin-hdr-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .admin-hdr-titulo { display: none; }
    .admin-hdr-sair { display: none; }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-logout:active { opacity: .75; }
    @media (min-width: 769px) {
      .admin-hdr-inner {
        max-width: 1100px;
        justify-content: space-between;
        padding: 0 24px;
      }
      .admin-logo {
        width: 48px !important;
        height: 48px !important;
        margin-top: 0 !important;
      }
      .admin-hdr-titulo {
        display: inline;
        font-size: 20px;
        font-weight: 900;
        color: #fff;
        letter-spacing: 0.5px;
      }
      .admin-hdr-sair { display: inline-block; }
      .admin-page { max-width: 1100px; padding: 32px 32px 64px; }
    }
    @media (max-width: 768px) {
      .admin-hdr-inner { justify-content: center; }
    }
  </style>
</head>
<body>
  <header class="hdr admin-hdr">
    <div class="hdr-inner admin-hdr-inner">
      <div class="admin-hdr-left">
        <img class="logo admin-logo" src="./logo.png" alt="Riva BJJ" />
        <span class="admin-hdr-titulo">Portal Administrativo</span>
      </div>
      <button class="btn-logout admin-hdr-sair" id="btnHdrSair">Sair</button>
    </div>
  </header>

  <main class="page admin-page">

    <!-- ── FORMULÁRIO ─────────────────────────────────────────── -->
    <section class="card" id="cardForm">
      <h1 class="title">Cadastrar Aluno</h1>

      <label class="label" for="fNome">Nome *</label>
      <input id="fNome" class="input" type="text" placeholder="Nome completo" required />

      <label class="label" for="fEmail">Email *</label>
      <input id="fEmail" class="input" type="email" inputmode="email" placeholder="email@exemplo.com" required />

      <label class="label" for="fFaixa">Faixa</label>
      <select id="fFaixa" class="input">
        <!-- Adulto -->
        <optgroup label="── Adulto ──">
          <option value="Branca">Branca</option>
          <option value="Azul">Azul</option>
          <option value="Roxa">Roxa</option>
          <option value="Marrom">Marrom</option>
          <option value="Preta">Preta</option>
        </optgroup>
        <!-- Kids / Infantil / Juvenil -->
        <optgroup label="── Kids / Infantil / Juvenil ──">
          <option value="Cinza e Branca">Cinza e Branca</option>
          <option value="Cinza">Cinza</option>
          <option value="Cinza e Preta">Cinza e Preta</option>
          <option value="Amarela e Branca">Amarela e Branca</option>
          <option value="Amarela">Amarela</option>
          <option value="Amarela e Preta">Amarela e Preta</option>
          <option value="Laranja e Branca">Laranja e Branca</option>
          <option value="Laranja">Laranja</option>
          <option value="Laranja e Preta">Laranja e Preta</option>
          <option value="Verde e Branca">Verde e Branca</option>
          <option value="Verde">Verde</option>
          <option value="Verde e Preta">Verde e Preta</option>
        </optgroup>
      </select>

      <label class="label" for="fGrau">Grau Atual</label>
      <select id="fGrau" class="input">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>

      <label class="label" for="fAulasNoGrau">Aulas no Grau (opcional)</label>
      <input id="fAulasNoGrau" class="input" type="number" min="0" placeholder="0" value="0" />

      <label class="label" for="fData">Data do Último Grau (opcional)</label>
      <input id="fData" class="input" type="date" />

      <label class="label" for="fCategoria">Categoria</label>
      <select id="fCategoria" class="input">
        <option value="Adulto">Adulto</option>
        <option value="Kids">Kids</option>
        <option value="Infantil">Infantil</option>
        <option value="Juvenil">Juvenil</option>
      </select>

      <label class="label" for="fCpf">CPF</label>
      <input id="fCpf" class="input" type="text" placeholder="000.000.000-00" />

      <label class="label" for="fDataNasc">Data de Nascimento</label>
      <input id="fDataNasc" class="input" type="date" />

      <label class="label" for="fDataInicio">Data de Início</label>
      <input id="fDataInicio" class="input" type="date" />

      <label class="label" for="fTelefone">Telefone</label>
      <input id="fTelefone" class="input" type="tel" placeholder="(00) 00000-0000" />

      <!-- ── Financeiro ─────────────────────────────────────────── -->
      <div style="border-top: 1px solid var(--border); margin: 16px 0 8px; padding-top: 12px;">
        <div style="font-size:15px;font-weight:900;color:#fff;margin-bottom:12px;">💰 Financeiro</div>

        <label class="label" for="fPlano">Plano</label>
        <select id="fPlano" class="input">
          <option value="">Não definido</option>
          <option value="Recorrente">Recorrente – R$ 200,00</option>
          <option value="Semestral">Semestral – R$ 220,00</option>
          <option value="Mensal">Mensal – R$ 240,00</option>
        </select>

        <label class="label" for="fGrupoFamiliar">Grupo Familiar (opcional)</label>
        <input id="fGrupoFamiliar" class="input" type="text" placeholder="Ex: Família Silva" />

        <label class="label" for="fDataContrato">Data de Início do Contrato</label>
        <input id="fDataContrato" class="input" type="date" />
      </div>

      <button class="btn primary" id="btnCadastrar">Cadastrar Aluno</button>
      <p class="msg err" id="formErr"></p>
      <p class="msg info" id="formInfo"></p>

      <button class="btn secondary" onclick="location.href='./alunos.html'">Ver Lista de Alunos</button>
      <button class="btn secondary" onclick="location.href='./administrativo.html'">← Voltar ao Portal</button>
    </section>

  </main>

  <script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const TOKEN_KEY = 'rv_prof_token';

    function setErr(id, msg)  { document.getElementById(id).textContent = msg; }
    function setInfo(id, msg) { document.getElementById(id).textContent = msg; }

    // ── Auth check ─────────────────────────────────────────────
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        location.href = './administrativo.html';
      }
    });

    // ── Helpers ────────────────────────────────────────────────
    const EMOJI_FAIXA_CAD = {
      'Branca': '🔲', 'Azul': '🟦', 'Roxa': '🟪', 'Marrom': '🟫', 'Preta': '⬛',
    };
    function gerarStatusCad(faixa, grau) {
      const emoji = EMOJI_FAIXA_CAD[faixa] || '🔲';
      const g = Math.min(Math.max(Number(grau) || 0, 0), 4);
      if (g === 0) return 'Iniciante';
      return emoji.repeat(g);
    }
    function toDateBR(isoDate) {
      if (!isoDate) return '';
      const [y, m, d] = isoDate.split('-');
      return `${d}/${m}/${y}`;
    }

    // ── Cadastrar aluno ────────────────────────────────────────
    document.getElementById('btnCadastrar').addEventListener('click', async () => {
      const nome  = document.getElementById('fNome').value.trim();
      const email = document.getElementById('fEmail').value.trim().toLowerCase();
      const faixa = document.getElementById('fFaixa').value;
      const grau  = document.getElementById('fGrau').value;
      const data  = document.getElementById('fData').value;

      if (!nome)  { setErr('formErr', 'Nome é obrigatório.'); return; }
      if (!email || email.indexOf('@') < 1) { setErr('formErr', 'Email inválido.'); return; }

      setErr('formErr', '');
      setInfo('formInfo', 'Cadastrando…');
      document.getElementById('btnCadastrar').disabled = true;

      try {
        const metaGrau = faixa === 'Branca' ? 36 : 56;
        const aulasNoGrau = parseInt(document.getElementById('fAulasNoGrau').value) || 0;
        await addDoc(collection(db, 'alunos'), {
          nome_aluno:       nome,
          email:            email,
          status:           'ATIVO',
          faixa:            faixa,
          grau_atual:       parseInt(grau) || 0,
          aulas_no_grau:    aulasNoGrau,
          aulas_restantes:  Math.max(0, metaGrau - aulasNoGrau),
          meta_grau:        metaGrau,
          data_ultimo_grau: toDateBR(data) || '',
          statusExame:      gerarStatusCad(faixa, parseInt(grau) || 0),
          telefone:         document.getElementById('fTelefone').value.trim(),
          cpf:              document.getElementById('fCpf').value.trim(),
          data_nasc:        document.getElementById('fDataNasc').value,
          data_inicio:      document.getElementById('fDataInicio').value,
          categoria:        document.getElementById('fCategoria').value,
          plano:            document.getElementById('fPlano').value,
          grupo_familiar:   document.getElementById('fGrupoFamiliar').value.trim(),
          data_contrato:    document.getElementById('fDataContrato').value,
          criadoEm:         serverTimestamp(),
        });

        setInfo('formInfo', '✅ Aluno cadastrado com sucesso!');
        document.getElementById('fNome').value           = '';
        document.getElementById('fEmail').value          = '';
        document.getElementById('fFaixa').value          = 'Branca';
        document.getElementById('fGrau').value           = '0';
        document.getElementById('fAulasNoGrau').value    = '0';
        document.getElementById('fData').value           = '';
        document.getElementById('fCategoria').value      = 'Adulto';
        document.getElementById('fCpf').value            = '';
        document.getElementById('fDataNasc').value       = '';
        document.getElementById('fDataInicio').value     = '';
        document.getElementById('fTelefone').value       = '';
        document.getElementById('fPlano').value          = '';
        document.getElementById('fGrupoFamiliar').value  = '';
        document.getElementById('fDataContrato').value   = '';
        localStorage.removeItem('rv_alunos_cache');
      } catch (e) {
        setErr('formErr', 'Erro ao cadastrar: ' + (e.message || 'tente novamente.'));
        setInfo('formInfo', '');
      } finally {
        document.getElementById('btnCadastrar').disabled = false;
      }
    });

    document.getElementById('btnHdrSair').addEventListener('click', () => {
      signOut(auth).catch(() => {});
      sessionStorage.removeItem(TOKEN_KEY);
      location.href = './administrativo.html';
    });
  </script>
</body>
</html>
