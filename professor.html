<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c0392b" />
  <title>Professor – Riva BJJ</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .portal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .portal-header .title { margin-bottom: 0; }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: #aaa;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-logout:active { opacity: .75; }

    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }
    @media (max-width: 400px) {
      .cards-grid { grid-template-columns: 1fr; }
    }

    .portal-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
    }
    .portal-card-icon {
      font-size: 40px;
      line-height: 1;
    }
    .portal-card-title {
      font-size: 18px;
      font-weight: 900;
      color: #fff;
    }
    .portal-card-sub {
      font-size: 13px;
      color: #aaa;
      line-height: 1.4;
      flex: 1;
    }
    .portal-card .btn {
      margin-top: 6px;
      font-size: 15px;
      padding: 13px 14px;
    }
  </style>
</head>
<body>
  <header class="hdr">
    <div class="hdr-inner">
      <img class="logo" src="./logo.png" alt="Riva BJJ" />
    </div>
  </header>

  <main class="page">

    <!-- ── SENHA ──────────────────────────────────────────────── -->
    <section class="card" id="cardSenha">
      <h1 class="title">Acesso Restrito</h1>
      <label class="label" for="senha">Senha do Professor</label>
      <input id="senha" class="input" type="password" placeholder="Digite a senha" autocomplete="current-password" />
      <button class="btn primary" id="btnEntrar">Entrar</button>
      <p class="msg err" id="senhaErr"></p>
      <p class="msg info" id="senhaInfo"></p>
    </section>

    <!-- ── PORTAL ─────────────────────────────────────────────── -->
    <section class="hidden" id="sectionPortal">
      <div class="card">
        <div class="portal-header">
          <h1 class="title">Portal do Professor</h1>
          <button class="btn-logout" id="btnLogout">Sair</button>
        </div>
      </div>

      <div class="cards-grid">
        <div class="portal-card">
          <div class="portal-card-icon">👥</div>
          <div class="portal-card-title">Alunos</div>
          <div class="portal-card-sub">Ver e gerenciar alunos cadastrados</div>
          <button class="btn primary" onclick="location.href='./alunos.html'">Abrir</button>
        </div>

        <div class="portal-card">
          <div class="portal-card-icon">➕</div>
          <div class="portal-card-title">Cadastrar Aluno</div>
          <div class="portal-card-sub">Adicionar novo aluno</div>
          <button class="btn primary" onclick="location.href='./cadastroaluno.html'">Abrir</button>
        </div>
      </div>
    </section>

  </main>

  <script>
    const API_BASE       = 'https://script.google.com/macros/s/AKfycbyBLlVjEvO35RufIh6pH9XOOTDXuj_BMrNHAJfdw9I-reScWX31dsVdOFJna1ZbJVqX/exec';
    const API_TIMEOUT_MS = 25000;
    const TOKEN_KEY      = 'rv_prof_token';
    const TOKEN_VAL      = 'rv_prof_ok';

    function apiCall(params) {
      return new Promise((resolve, reject) => {
        const cb = '_rv' + Date.now() + Math.floor(Math.random() * 9999);
        const s  = document.createElement('script');
        const t  = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, API_TIMEOUT_MS);
        function cleanup() { clearTimeout(t); delete window[cb]; s.remove(); }
        window[cb] = (d) => { cleanup(); resolve(d); };
        s.onerror  = () => { cleanup(); reject(new Error('net')); };
        const qs = Object.entries(params).map(([k, v]) => `${k}=${encodeURIComponent(v)}`).join('&');
        s.src = `${API_BASE}?${qs}&callback=${cb}`;
        document.head.appendChild(s);
      });
    }

    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
    function setErr(id, msg)  { document.getElementById(id).textContent = msg; }
    function setInfo(id, msg) { document.getElementById(id).textContent = msg; }

    // ── Init ───────────────────────────────────────────────────
    function init() {
      if (sessionStorage.getItem(TOKEN_KEY) === TOKEN_VAL) {
        hide('cardSenha');
        show('sectionPortal');
      }
    }

    // ── Verificar senha ────────────────────────────────────────
    document.getElementById('btnEntrar').addEventListener('click', async () => {
      const senha = document.getElementById('senha').value.trim();
      if (!senha) { setErr('senhaErr', 'Digite a senha.'); return; }
      setErr('senhaErr', '');
      setInfo('senhaInfo', 'Verificando…');
      document.getElementById('btnEntrar').disabled = true;
      try {
        const r = await apiCall({ action: 'verificarSenha', senha });
        if (r && r.ok) {
          sessionStorage.setItem(TOKEN_KEY, TOKEN_VAL);
          setInfo('senhaInfo', '');
          hide('cardSenha');
          show('sectionPortal');
        } else {
          setErr('senhaErr', r && r.erro ? r.erro : 'Senha incorreta.');
          setInfo('senhaInfo', '');
        }
      } catch (e) {
        setErr('senhaErr', 'Erro de conexão. Tente novamente.');
        setInfo('senhaInfo', '');
      } finally {
        document.getElementById('btnEntrar').disabled = false;
      }
    });

    document.getElementById('senha').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btnEntrar').click();
    });

    // ── Logout ─────────────────────────────────────────────────
    document.getElementById('btnLogout').addEventListener('click', () => {
      sessionStorage.removeItem(TOKEN_KEY);
      location.reload();
    });

    init();
  </script>
</body>
</html>
