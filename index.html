<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c0392b" />
  <title>Riva BJJ</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <header class="hdr">
    <div class="hdr-inner">
      <img class="logo" src="./logo.png" alt="Riva BJJ">
    </div>
  </header>

  <main class="page">
    <section class="card" id="cardLogin">
      <h1 class="title">Acesso</h1>

      <label class="label" for="cpf">CPF</label>
      <input id="cpf" class="input" inputmode="numeric" autocomplete="off" placeholder="Digite seu CPF" maxlength="14" />

      <button class="btn primary" id="btnLogin">Entrar</button>

      <p class="msg err" id="err"></p>
      <p class="msg info" id="info"></p>
    </section>

    <section class="card hidden" id="cardAluno">
      <div class="row">
        <div>
          <div class="name" id="aNome">—</div>
          <div class="badge">ATIVO</div>
        </div>
        <button class="btn ghost" id="btnSair">Sair</button>
      </div>

      <div class="kv">
        <div class="k">Faixa</div><div class="v" id="aFaixa">—</div>
        <div class="k">Grau</div><div class="v" id="aGrau">—</div>
        <div class="k">Aulas no grau</div><div class="v" id="aAulas">—</div>
        <div class="k">Último grau em</div><div class="v" id="aData">—</div>
      </div>

      <div class="status" id="aStatus">—</div>

      <button class="btn secondary" id="btnAtualizar">Atualizar</button>
    </section>

    <!-- ── AGENDAR ─────────────────────────────────────────── -->
    <section class="card hidden" id="cardAgendar">
      <h2 class="title">Agendar Treino</h2>

      <div id="diasRow" class="dias-row"></div>

      <div id="sessoesLista" class="sessoes-lista hidden"></div>

      <div id="presencaBox" class="hidden">
        <div class="presenca-header">
          <span class="presenca-titulo" id="presencaTitulo"></span>
          <button class="btn primary btn-sm hidden" id="btnCheckin">Check-in</button>
        </div>
        <div id="presencaLista"></div>
        <button class="btn btn-cancel hidden" id="btnDeletarCheckin">Cancelar meu check-in</button>
      </div>
    </section>

    <!-- ── PROFESSOR ──────────────────────────────────────── -->
    <section class="card hidden" id="cardProf">

      <div class="row">
        <div>
          <div class="name" id="pNome">—</div>
          <div class="badge badge-prof">PROFESSOR</div>
        </div>
        <button class="btn ghost" id="btnProfSair">Sair</button>
      </div>

      <div id="profDiasRow" class="dias-row"></div>

      <div id="profSessoesLista" class="sessoes-lista hidden"></div>

      <div id="profPresencaBox" class="hidden">
        <div class="presenca-titulo mb8" id="profPresencaTitulo"></div>
        <div id="profPresencaLista"></div>
      </div>

    </section>
  </main>

  <nav class="bnav hidden" id="mainNav">
    <button class="navbtn on" id="navHome" aria-label="Início">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </button>
    <button class="navbtn" id="navAgendar" aria-label="Agendar">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11zM7 11h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2zM7 14h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2zM7 17h2v2H7zm4 0h2v2h-2z"/></svg>
    </button>
  </nav>

  <script src="./app.js"></script>
  <script>
    // registra service worker
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(()=>{});
    }
  </script>
</body>
</html>
