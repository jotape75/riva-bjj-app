<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c0392b" />
  <title>Portal Administrativo – Riva BJJ</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .portal-welcome {
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 20px;
    }

    .portal-cards {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .portal-card {
      flex: 1 1 calc(50% - 6px);
      min-width: 140px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
      justify-content: space-between;
      align-items: stretch;
    }

    .portal-card-icon {
      font-size: 40px;
      line-height: 1;
    }

    .portal-card-title {
      font-size: 18px;
      font-weight: 900;
      color: #fff;
    }

    .portal-card-subtitle {
      font-size: 13px;
      color: #aaa;
      line-height: 1.4;
    }

    .portal-card .btn {
      margin-top: 8px;
      font-size: 15px;
      padding: 12px 14px;
    }

    @media (max-width: 360px) {
      .portal-cards {
        flex-direction: column;
      }
      .portal-card {
        flex: 1 1 100%;
      }
    }

    .portal-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-logout:active { opacity: .75; }

    /* ── Header desktop compacto ── */
    .admin-hdr-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .admin-hdr-titulo { display: none; }
    .admin-hdr-sair { display: none; }

    @media (min-width: 769px) {
      .admin-hdr-inner {
        max-width: 1100px;
        justify-content: space-between;
        padding: 0 24px;
      }
      .admin-logo {
        width: 48px !important;
        height: 48px !important;
        margin-top: 0 !important;
      }
      .admin-hdr-titulo {
        display: inline;
        font-size: 20px;
        font-weight: 900;
        color: #fff;
        letter-spacing: 0.5px;
      }
      .admin-hdr-sair { display: inline-block; }
      /* Layout desktop: largura maior, não centralizado */
      .admin-page {
        max-width: 1100px;
        padding: 32px 32px 64px;
      }
      /* Portal cards em grid 3 colunas no desktop */
      .portal-cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
    }
    @media (max-width: 768px) {
      .admin-hdr-inner { justify-content: center; }
    }
  </style>
</head>
<body>
  <header class="hdr admin-hdr">
    <div class="hdr-inner admin-hdr-inner">
      <div class="admin-hdr-left">
        <img class="logo admin-logo" src="./logo.png" alt="Riva BJJ" />
        <span class="admin-hdr-titulo">Portal Administrativo</span>
      </div>
      <button class="btn-logout admin-hdr-sair" id="btnHdrSair">Sair</button>
    </div>
  </header>

  <main class="page admin-page">

    <!-- ── LOGIN ──────────────────────────────────────────────── -->
    <section class="card" id="cardLogin">
      <h1 class="title">Acesso Administrativo</h1>

      <label class="label" for="email">Email</label>
      <input id="email" class="input" type="email" inputmode="email" autocomplete="email" placeholder="seu@email.com" required />

      <label class="label" for="senha">Senha</label>
      <input id="senha" class="input" type="password" autocomplete="current-password" placeholder="Digite a senha" required />

      <button class="btn primary" id="btnEntrar">Entrar</button>

      <p class="msg err" id="loginErr"></p>
      <p class="msg info" id="loginInfo"></p>
    </section>

    <!-- ── PORTAL ──────────────────────────────────────────────── -->
    <section class="card hidden" id="cardPortal">
      <div class="portal-header-row">
        <div class="portal-welcome" id="portalWelcome">Olá!</div>
        <button class="btn-logout" id="btnLogout">Sair</button>
      </div>

      <div class="portal-cards">
        <div class="portal-card">
          <div class="portal-card-icon">👥</div>
          <div class="portal-card-title">Alunos</div>
          <div class="portal-card-subtitle">Ver e gerenciar alunos cadastrados</div>
          <button class="btn primary" onclick="location.href='./alunos.html'">Ver Alunos</button>
        </div>

        <div class="portal-card">
          <div class="portal-card-icon">➕</div>
          <div class="portal-card-title">Cadastrar Aluno</div>
          <div class="portal-card-subtitle">Adicionar novo aluno</div>
          <button class="btn primary" onclick="location.href='./cadastroaluno.html'">Cadastrar</button>
        </div>

        <div class="portal-card">
          <div class="portal-card-icon">🎂</div>
          <div class="portal-card-title">Aniversariantes</div>
          <div class="portal-card-subtitle">Ver aniversariantes da semana</div>
          <button class="btn primary" onclick="location.href='./aniversariantes.html'">Ver Aniversariantes</button>
        </div>
      </div>
    </section>

  </main>

  <script>
    const API_BASE       = 'https://script.google.com/macros/s/AKfycbyBLlVjEvO35RufIh6pH9XOOTDXuj_BMrNHAJfdw9I-reScWX31dsVdOFJna1ZbJVqX/exec';
    const API_TIMEOUT_MS = 25000;
    const TOKEN_KEY      = 'rv_prof_token';
    const NOME_KEY       = 'rv_prof_nome';

    function apiCall(params) {
      return new Promise((resolve, reject) => {
        const cb = '_rv' + Date.now() + Math.floor(Math.random() * 9999);
        const s  = document.createElement('script');
        const t  = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, API_TIMEOUT_MS);
        function cleanup() { clearTimeout(t); delete window[cb]; s.remove(); }
        window[cb] = (d) => { cleanup(); resolve(d); };
        s.onerror  = () => { cleanup(); reject(new Error('net')); };
        const qs = Object.entries(params).map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
        s.src = `${API_BASE}?${qs}&callback=${cb}`;
        document.head.appendChild(s);
      });
    }

    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }

    function doLogout() {
      sessionStorage.removeItem(TOKEN_KEY);
      sessionStorage.removeItem(NOME_KEY);
      location.reload();
    }

    function showPortal(nome) {
      document.getElementById('portalWelcome').textContent = 'Olá, ' + (nome || 'Professor') + '!';
      hide('cardLogin');
      show('cardPortal');
    }

    // ── Init ───────────────────────────────────────────────────
    function init() {
      const token = sessionStorage.getItem(TOKEN_KEY);
      const nome  = sessionStorage.getItem(NOME_KEY);
      if (token === 'rv_prof_ok') {
        showPortal(nome);
      }
    }

    // ── Login ──────────────────────────────────────────────────
    document.getElementById('btnEntrar').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim().toLowerCase();
      const senha = document.getElementById('senha').value.trim();

      if (!email || email.indexOf('@') < 1) {
        document.getElementById('loginErr').textContent = 'Email inválido.';
        return;
      }
      if (!senha) {
        document.getElementById('loginErr').textContent = 'Digite a senha.';
        return;
      }

      document.getElementById('loginErr').textContent  = '';
      document.getElementById('loginInfo').textContent = 'Verificando…';
      document.getElementById('btnEntrar').disabled    = true;

      try {
        const r = await apiCall({ action: 'loginProfessor', email, senha });
        if (r && r.ok) {
          sessionStorage.setItem(TOKEN_KEY, r.token || 'rv_prof_ok');
          sessionStorage.setItem(NOME_KEY, r.nome || '');
          document.getElementById('loginInfo').textContent = '';
          showPortal(r.nome);
        } else {
          document.getElementById('loginErr').textContent  = r && r.erro ? r.erro : 'Credenciais inválidas.';
          document.getElementById('loginInfo').textContent = '';
        }
      } catch (e) {
        document.getElementById('loginErr').textContent  = 'Erro de conexão. Tente novamente.';
        document.getElementById('loginInfo').textContent = '';
      } finally {
        document.getElementById('btnEntrar').disabled = false;
      }
    });

    document.getElementById('senha').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btnEntrar').click();
    });

    document.getElementById('email').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('senha').focus();
    });

    // ── Logout ─────────────────────────────────────────────────
    document.getElementById('btnLogout').addEventListener('click', doLogout);
    document.getElementById('btnHdrSair').addEventListener('click', doLogout);

    init();
  </script>
</body>
</html>
