<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c0392b" />
  <title>Troca de Faixa – Riva BJJ</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .admin-hdr-left { display: flex; align-items: center; gap: 14px; }
    .admin-hdr-titulo { display: none; }
    .admin-hdr-sair { display: none; }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-logout:active { opacity: .75; }

    @media (min-width: 769px) {
      .admin-hdr-inner { max-width: 1100px; justify-content: space-between; padding: 0 24px; }
      .admin-logo { width: 48px !important; height: 48px !important; margin-top: 0 !important; }
      .admin-hdr-titulo { display: inline; font-size: 20px; font-weight: 900; color: #fff; letter-spacing: 0.5px; }
      .admin-hdr-sair { display: inline-block; }
      .admin-page { max-width: 1100px; padding: 32px 32px 64px; }
    }
    @media (max-width: 768px) { .admin-hdr-inner { justify-content: center; } }

    .page-title {
      font-size: 24px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 4px;
    }
    .page-subtitle {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 20px;
    }

    .troca-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      background: #222;
      border: 1px solid #333;
      border-radius: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .troca-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }
    .troca-nome {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .troca-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .lista-scroll { padding-bottom: 24px; }
  </style>
</head>
<body>
  <header class="hdr admin-hdr">
    <div class="hdr-inner admin-hdr-inner">
      <div class="admin-hdr-left">
        <img class="logo admin-logo" src="./logo.png" alt="Riva BJJ" />
        <span class="admin-hdr-titulo">Portal Administrativo</span>
      </div>
      <button class="btn-logout admin-hdr-sair" id="btnHdrSair">Sair</button>
    </div>
  </header>

  <main class="page admin-page">
    <section id="sectionTrocaFaixa">
      <div class="page-title">🥋 Troca de Faixa</div>
      <div class="page-subtitle" id="pageSubtitle">Carregando…</div>

      <p class="msg info" id="pageInfo"></p>

      <div id="listaTrocaFaixa" class="lista-scroll"></div>
    </section>
  </main>

  <script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const TOKEN_KEY = 'rv_prof_token';
    const MAX_GRAU  = 4;

    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        carregarTrocaFaixa();
      } else {
        location.href = './administrativo.html';
      }
    });

    async function carregarTrocaFaixa() {
      const subtitle = document.getElementById('pageSubtitle');
      const info     = document.getElementById('pageInfo');
      const lista    = document.getElementById('listaTrocaFaixa');

      try {
        const q    = query(collection(db, 'alunos'), where('status', '==', 'ATIVO'));
        const snap = await getDocs(q);
        const data = [];

        snap.forEach(d => {
          const a         = d.data();
          const grauAtual = a.grau_atual ?? 0;
          const metaGrau  = a.meta_grau ?? (a.faixa === 'Branca' ? 36 : 56);
          const restantes = Math.max(0, metaGrau - (a.aulas_no_grau ?? 0));
          if (grauAtual >= MAX_GRAU) {
            data.push({
              nome:      a.nome_aluno || '',
              faixa:     a.faixa || '',
              grau:      grauAtual,
              restantes,
            });
          }
        });

        data.sort((a, b) => a.nome.localeCompare(b.nome));

        const total = data.length;
        subtitle.textContent = total
          ? `${total} aluno${total > 1 ? 's' : ''} pronto${total > 1 ? 's' : ''} para trocar de faixa`
          : 'Nenhum aluno pronto para trocar de faixa';

        if (!total) {
          lista.innerHTML = '<p class="presenca-vazia">Nenhum aluno no grau máximo no momento.</p>';
          return;
        }

        lista.innerHTML = data.map(a => `
          <div class="troca-item">
            <div class="troca-info">
              <div class="troca-nome" title="${esc(a.nome)}">${esc(a.nome)}</div>
              <div class="troca-badges">
                <span class="presenca-status status-ok">${esc(a.faixa)}</span>
                <span class="presenca-status status-ok">Grau ${esc(String(a.grau))}</span>
                ${a.restantes > 0
                  ? `<span class="presenca-status status-pend">${esc(String(a.restantes))} aulas restantes</span>`
                  : `<span class="presenca-status status-ok">✓ Pronto</span>`
                }
              </div>
            </div>
          </div>
        `).join('');

      } catch (e) {
        subtitle.textContent = '';
        lista.innerHTML = `<p class="msg err">Erro ao carregar: ${esc(e.message)}</p>`;
      }
    }

    document.getElementById('btnHdrSair').addEventListener('click', () => {
      signOut(auth).catch(() => {});
      sessionStorage.removeItem(TOKEN_KEY);
      location.href = './administrativo.html';
    });
  </script>
</body>
</html>
